<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比赛控制台</title>
<style>
:root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --dim: #94a3b8; --accent: #3b82f6; --green: #22c55e; --red: #ef4444; --gold: #f59e0b; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Microsoft YaHei', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 15px; }

/* 区域1: 顶部导航 */
.nav-bar { display: flex; align-items: center; height: 36px; background: var(--card); padding: 0 12px; border-bottom: 1px solid #334155; gap: 8px; }
.nav-bar .current-info { font-size: 15px; font-weight: bold; flex: 1; }
.nav-bar button { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.nav-btn { background: #475569; color: white; }
.state-dot { width: 10px; height: 10px; border-radius: 50%; }
.state-dot.waiting { background: var(--gold); }
.state-dot.ready { background: var(--accent); }
.state-dot.racing { background: var(--green); }
.state-dot.finished { background: var(--red); }
.state-label { font-size: 14px; color: var(--dim); margin-left: 4px; }

/* 主体 */
.main-area { flex: 1; display: flex; overflow: hidden; }

/* 赛程树面板（左侧） */
.schedule-tree-panel { width: 220px; background: var(--card); border-right: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; }
.schedule-tree-panel .panel-header { padding: 8px 10px; font-size: 14px; font-weight: bold; color: var(--dim); border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
.schedule-tree-panel .panel-header button { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 16px; }
.tree-scroll { flex: 1; overflow-y: auto; padding: 4px 0; }
.tree-session { }
.tree-session-header { padding: 4px 10px; font-size: 13px; font-weight: bold; color: var(--dim); cursor: pointer; user-select: none; }
.tree-session-header:hover { color: var(--text); }
.tree-session-header .arrow { display: inline-block; width: 12px; font-size: 12px; }
.tree-event { padding: 3px 10px 3px 22px; font-size: 13px; color: var(--text); cursor: pointer; user-select: none; }
.tree-event:hover { background: #253049; }
.tree-heat { padding: 3px 10px 3px 38px; font-size: 13px; color: var(--dim); cursor: pointer; user-select: none; }
.tree-heat:hover { background: #253049; }
.tree-heat.active { background: var(--accent); color: white; border-radius: 3px; margin: 1px 4px; }

/* 滚动时间（泳池面板右下角） */
.running-time-corner { position: absolute; bottom: 8px; right: 12px; font-size: 38px; font-weight: bold; color: var(--gold); font-family: Consolas, monospace; opacity: 0.9; pointer-events: none; text-shadow: 0 0 10px rgba(245,158,11,0.3); }

/* 发令按钮（右侧面板内） */
.btn-ready { background: var(--gold); color: #000; }
.btn-start { background: var(--green); color: #fff; }
.btn-restart { background: var(--red); color: #fff; }


/* 泳池图 */
.pool-area { flex: 1; overflow-y: auto; padding: 8px; }
.pool-header { display: flex; align-items: center; height: 24px; color: var(--dim); padding: 0 6px; margin-bottom: 2px; font-size: 11px; }

.lane-row { display: flex; align-items: center; height: 48px; background: var(--card); border-radius: 4px; margin-bottom: 3px; padding: 0 6px; }
.lane-row:hover { background: #253049; }
.lane-row.false-start { border: 1px solid var(--gold); }
.lane-row.selected { outline: 1px solid var(--accent); }

.devices { display: flex; align-items: center; gap: 3px; }
.left-devices { width: 200px; }
.right-devices { width: 200px; }
.device-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #475569; cursor: pointer; flex-shrink: 0; }
.device-dot.open { background: var(--green); border-color: var(--green); }
.device-dot.closed { background: #475569; border-color: #64748b; }
.device-dot.broken { background: var(--red); border-color: var(--red); }
.device-dot.falsestart { background: var(--gold); border-color: var(--gold); }
.device-dot.notinstalled { background: transparent; border: 2px dashed #334155; }
.touch-btn { width: 78px; height: 26px; background: #475569; border: 1px solid #64748b; border-radius: 3px; color: white; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.touch-btn:hover { background: var(--accent); }
.touch-btn:active { background: var(--green); }
.device-label { width: 18px; font-size: 11px; color: var(--dim); text-align: center; flex-shrink: 0; }
.device-label-btn { width: 78px; font-size: 11px; color: var(--dim); text-align: center; flex-shrink: 0; }

.lane-mid { flex: 1; display: flex; align-items: center; padding: 0 8px; min-width: 0; }
.lane-num { width: 24px; font-size: 19px; font-weight: bold; color: var(--dim); text-align: center; margin-right: 6px; }
.swimmer-info { font-size: 16px; white-space: nowrap; overflow: hidden; width: 110px; }
.swimmer-info .name { font-weight: bold; }
.swimmer-info .team { color: var(--dim); font-size: 14px; }
.swim-dir { width: 24px; font-size: 20px; text-align: center; color: var(--accent); flex-shrink: 0; }
.lane-track { flex: 1; height: 22px; background: #1a2332; border-radius: 4px; margin: 0 6px; display: flex; align-items: center; overflow: hidden; padding: 0 4px; font-family: Consolas, monospace; font-size: 15px; letter-spacing: 1px; }
.lane-track.going { justify-content: flex-start; }
.lane-track.returning { justify-content: flex-end; }
.lane-track .arrows { color: var(--accent); white-space: nowrap; }
.lane-track.returning .arrows { color: var(--green); }
.lane-track .arrows.finished { color: var(--gold); }
.close-indicator { font-size: 14px; color: var(--gold); min-width: 55px; text-align: center; }

.info-area { width: 280px; display: flex; align-items: center; font-family: Consolas, monospace; }
.info-area .reaction { width: 55px; font-size: 17px; text-align: center; }
.info-area .final-time { width: 100px; font-size: 19px; font-weight: bold; text-align: center; }
.info-area .rank { width: 35px; font-size: 20px; font-weight: bold; text-align: center; }
.info-area .rank.r1 { color: var(--gold); }
.info-area .rank.r2 { color: #c0c0c0; }
.info-area .rank.r3 { color: #cd7f32; }

/* 右侧操作面板 */
.right-panel { width: 200px; background: var(--card); padding: 8px; border-left: 1px solid #334155; overflow-y: auto; }
.right-col { display: flex; flex-direction: column; gap: 4px; }
.right-col h3 { font-size: 13px; margin: 6px 0 2px; color: var(--dim); border-bottom: 1px solid #334155; padding-bottom: 3px; }
.right-col h3:first-child { margin-top: 0; }
.action-btn { width: 100%; padding: 7px 4px; border: none; border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; }
.action-btn:active { opacity: 0.8; }
.btn-confirm { background: var(--accent); color: white; }
.btn-all-open { background: var(--green); color: white; }
.btn-all-close { background: #64748b; color: white; }

/* 底部信息 */
.bottom-bar { height: 80px; background: var(--card); border-top: 1px solid #334155; display: flex; }
.bottom-bar .start-list { flex: 1; overflow-y: auto; padding: 6px 12px; font-size: 13px; }
.bottom-bar .log { flex: 1; overflow-y: auto; padding: 6px 12px; font-size: 13px; color: var(--dim); border-left: 1px solid #334155; }
.bottom-bar .conn-status { width: 180px; padding: 6px 12px; font-size: 13px; border-left: 1px solid #334155; }
.conn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.conn-dot.on { background: var(--green); }
.conn-dot.off { background: var(--red); }

.readonly-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
.readonly-overlay span { background: var(--gold); color: #000; padding: 8px 20px; border-radius: 6px; font-weight: bold; }
.hidden { display: none !important; }

/* 参数设置对话框 */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal-dialog { background: var(--card); border: 1px solid #475569; border-radius: 8px; padding: 20px 24px; min-width: 340px; }
.modal-dialog h2 { font-size: 17px; margin-bottom: 14px; color: var(--text); }
.modal-dialog .param-row { display: flex; align-items: center; margin-bottom: 10px; }
.modal-dialog .param-row label { flex: 1; font-size: 15px; color: var(--dim); }
.modal-dialog .param-row input { width: 70px; background: #334155; border: 1px solid #475569; color: white; padding: 4px 8px; border-radius: 4px; text-align: center; font-size: 15px; }
.modal-dialog .param-row .unit { font-size: 13px; color: var(--dim); margin-left: 4px; width: 16px; }
.modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.modal-btns button { padding: 6px 20px; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
.modal-btns .btn-ok { background: var(--accent); color: white; font-weight: bold; }
.modal-btns .btn-cancel { background: #475569; color: white; }
.nav-bar .settings-btn { background: #475569; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-left: 8px; }
.nav-bar .settings-btn:hover { background: var(--accent); }

/* 发令位置指示灯 */
.start-indicator { width: 8px; height: 100%; min-height: 28px; border-radius: 2px; flex-shrink: 0; }
.start-indicator.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
.start-indicator.inactive { background: transparent; }
.lane-row .start-ind { width: 8px; margin: 0 2px; flex-shrink: 0; }
</style>
</head>
<body>
<!-- 区域1: 导航栏 -->
<div class="nav-bar">
    <span class="current-info" id="currentInfo">未选择比赛</span>
    <div id="stateDot" class="state-dot waiting"></div>
    <span id="stateLabel" class="state-label">等待</span>
    <button class="settings-btn" onclick="openSettings()">&#9881; 参数设置</button>
    <button class="fullscreen-btn" onclick="goFullScreen()" style="position:fixed;top:4px;right:80px;z-index:50;padding:4px 10px;background:#3B82F6;color:white;border:none;border-radius:4px;font-size:12px;cursor:pointer;">全屏</button>
</div>

<!-- 参数设置对话框 -->
<div id="settingsModal" class="modal-overlay hidden" onclick="if(event.target===this)closeSettings()">
    <div class="modal-dialog">
        <h2>参数设置</h2>
        <div class="param-row"><label>泳道关闭时间</label><input id="dlgCloseTime" value="20"><span class="unit">秒</span></div>
        <div class="param-row"><label>出发台关闭延迟</label><input id="dlgSBDelay" value="3"><span class="unit">秒</span></div>
        <div class="param-row"><label>成绩确认关闭延迟</label><input id="dlgConfDelay" value="3"><span class="unit">秒</span></div>
        <div class="param-row"><label>抢跳判定阈值</label><input id="dlgFSThresh" value="0.10"><span class="unit">秒</span></div>
        <div class="param-row"><label>分段成绩显示时长</label><input id="dlgSplitDisp" value="5"><span class="unit">秒</span></div>
        <div class="param-row"><label>第1名成绩停留时间</label><input id="dlgFirstPlaceHold" value="3"><span class="unit">秒</span></div>
        <div class="param-row" style="margin-top:6px;padding-top:8px;border-top:1px solid #475569;">
            <label>终点位置</label>
            <span style="display:flex;gap:12px;">
                <label style="cursor:pointer;color:var(--text);font-size:14px;"><input type="radio" name="startPos" value="left" id="dlgStartLeft" checked> 左端</label>
                <label style="cursor:pointer;color:var(--text);font-size:14px;"><input type="radio" name="startPos" value="right" id="dlgStartRight"> 右端</label>
            </span>
        </div>
        <div class="param-row" style="margin-top:6px;padding-top:8px;border-top:1px solid #475569;">
            <label>服务器地址</label>
            <input id="dlgServerHost" value="" style="flex:1;">
            <button style="padding:4px 12px;background:#3B82F6;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;margin-left:4px;" onclick="applyServerHost()">连接</button>
        </div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid #475569;">
            <button style="width:100%;padding:8px;background:#8B5CF6;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold;" onclick="closeSettings();openDeviceManager();">设备状态管理</button>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeSettings()">取消</button>
            <button class="btn-ok" onclick="applySettings()">确定</button>
        </div>
    </div>
</div>

<!-- 设备状态管理弹窗 -->
<div id="deviceModal" class="modal-overlay hidden" onclick="if(event.target===this)closeDeviceManager()">
    <div class="modal-dialog" style="max-width:750px;">
        <h2 style="color:#F59E0B;">泳道设备好/坏状态设置</h2>
        <div style="overflow-x:auto;" id="deviceStatusPanel"></div>
        <div style="display:flex;gap:8px;margin-top:12px;">
            <button style="flex:1;padding:8px;background:#22C55E;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold;" onclick="setAllDevices(false)">全部设为好</button>
            <button style="flex:1;padding:8px;background:#EF4444;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold;" onclick="setAllDevices(true)">全部设为坏</button>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeDeviceManager()">关闭</button>
        </div>
    </div>
</div>

<!-- 只读遮罩 -->
<div id="readonlyOverlay" class="readonly-overlay hidden"><span>只读模式 — EXE已接管控制</span></div>

<!-- 主体 -->
<div class="main-area">
    <!-- 赛程树（左侧） -->
    <div class="schedule-tree-panel">
        <div class="panel-header">
            <span>赛程导航</span>
        </div>
        <div class="tree-scroll" id="scheduleTree"></div>
    </div>

    <!-- 泳池图 -->
    <div class="pool-area" style="position:relative;">
        <div class="pool-header" id="poolHeader"></div>
        <div id="poolLanes"></div>
        <div class="running-time-corner" id="runTime">0.0</div>
    </div>

    <!-- 右侧操作面板 -->
    <div class="right-panel">
        <div class="right-col">
            <h3>比赛控制</h3>
            <button class="action-btn btn-ready" onclick="sendCmd('READY')">就 位</button>
            <button class="action-btn btn-start" onclick="sendCmd('START_RACE')">发 令</button>
            <button class="action-btn btn-restart" onclick="confirmTimerReset()">计时复位</button>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:2px;">
                <button class="action-btn btn-all-open" onclick="sendCmd('OPEN_ALL_LANES')">全开</button>
                <button class="action-btn btn-all-close" onclick="sendCmd('CLOSE_ALL_LANES')">全关</button>
            </div>
            <button class="action-btn btn-confirm" onclick="confirmResult()">确认本组成绩</button>
            <h3>泳道操作</h3>
            <div style="display:flex;gap:4px;align-items:center;">
                <input type="number" id="laneInput" min="0" max="9" value="4" style="width:46px;padding:4px;border:1px solid #475569;border-radius:4px;background:#1E293B;color:white;text-align:center;font-size:14px;">
                <span style="color:#94A3B8;font-size:12px;">道</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
                <button class="action-btn" style="background:#64748B;" onclick="markLane('DNS')">DNS</button>
                <button class="action-btn" style="background:#78716C;" onclick="markLane('DNF')">DNF</button>
                <button class="action-btn" style="background:#9CA3AF;" onclick="markLane('DSQ')">DSQ</button>
                <button class="action-btn" style="background:#D97706;" onclick="manualTimeInput()">手动输入</button>
            </div>
            <h3>显示控制</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
                <button class="action-btn" style="background:#3B82F6;" onclick="sendDisplay('SHOW_START_LIST')">出发表</button>
                <button class="action-btn" style="background:#2563EB;" onclick="sendDisplay('SHOW_LIVE_RACE')">比赛视图</button>
                <button class="action-btn" style="background:#059669;" onclick="sendDisplay('SHOW_HEAT_RESULT')">组成绩</button>
                <button class="action-btn" style="background:#10B981;" onclick="sendDisplay('SHOW_EVENT_RANKING')">总排名</button>
                <button class="action-btn" style="background:#D97706;" onclick="sendDisplay('SHOW_TEAM_STANDINGS')">团体积分</button>
                <button class="action-btn" style="background:#F59E0B;" onclick="sendDisplay('SHOW_AWARDS')">颁奖</button>
                <button class="action-btn" style="background:#DC2626;" onclick="sendDisplay('SHOW_RECORDS')">纪录</button>
                <button class="action-btn" style="background:#8B5CF6;" onclick="sendDisplay('SHOW_WELCOME')">欢迎</button>
            </div>
            <button class="action-btn" style="background:#F59E0B;font-size:15px;padding:9px;margin-top:4px;" onclick="publishResult()">成绩发布</button>
            <h3 style="display:inline;">计时源对比</h3>
            <span style="color:#94A3B8;font-size:11px;margin-left:4px;">分段:</span>
            <select id="splitSelectCombo" onchange="showTimingSourceData()" style="width:100px;font-size:12px;background:black;color:white;border:1px solid #475569;border-radius:3px;padding:2px;">
                <option value="0">终点</option>
            </select>
            <div id="timingSourceCompare" style="font-size:12px;color:var(--dim);flex:1;overflow-y:auto;min-height:40px;margin-top:4px;"></div>
        </div>
    </div>
</div>

<!-- 底部 -->
<div class="bottom-bar">
    <div class="start-list" id="startList"></div>
    <div class="log" id="logArea"></div>
    <div class="conn-status">
        <div><span id="wsConn" class="conn-dot off"></span>服务器</div>
        <div><span id="hwConn" class="conn-dot off"></span>计时硬件</div>
        <div style="margin-top:4px;font-size:12px;color:var(--dim);" id="controlMode">控制模式: -</div>
    </div>
</div>

<script>
var ws, data = {}, selectedLane = -1;
// 本地计时器：独立于服务器广播，保证滚动时间不间断
var _localTimerStart = 0;    // 本地记录的比赛开始时刻（Date.now()）
var _localTimerSynced = false; // 是否已同步过
// 每道分段显示跟踪
var laneSplitState = {};  // {lane: {splitCount, showTime}}
var laneReactionState = {};  // {lane: {value, showTime}}
var selectedHeatKey = ''; // "gender|event|stage|heat"
// 第1名成绩停留显示
var firstPlaceHoldTime = parseFloat(localStorage.getItem('swimFirstPlaceHold')) || 3;
var firstPlaceFinishTime = '';  // 第1名的成绩文本
var firstPlaceShowStart = 0;   // 开始显示的时间戳
var firstPlaceDetectedRank = 0; // 已检测到的最高完赛名次
var startPosition = localStorage.getItem('swimStartPosition') || 'left';
var finishPosition = localStorage.getItem('swimFinishPosition') || 'left';

window.onbeforeunload = function(e) {
    // 退出前保存参数
    localStorage.setItem('swimFinishPosition', finishPosition);
    localStorage.setItem('swimFirstPlaceHold', firstPlaceHoldTime.toString());
    localStorage.setItem('swimStartPosition', startPosition);
    e.preventDefault(); e.returnValue = ''; return '确定要关闭比赛控制台？';
};

function goFullScreen() { var el=document.documentElement; if(document.fullscreenElement)return; if(el.requestFullscreen)el.requestFullscreen(); else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen(); else if(el.msRequestFullscreen)el.msRequestFullscreen(); }
document.addEventListener('fullscreenchange', function() { var btns=document.querySelectorAll('.fullscreen-btn'); for(var i=0;i<btns.length;i++) btns[i].style.display=document.fullscreenElement?'none':''; });
document.addEventListener('webkitfullscreenchange', function() { var btns=document.querySelectorAll('.fullscreen-btn'); for(var i=0;i<btns.length;i++) btns[i].style.display=document.webkitFullscreenElement?'none':''; });


var _connFailCount = 0;
function getServerHost(forceAsk) {
    var params = new URLSearchParams(window.location.search);
    if (params.get('host')) return params.get('host');
    if (!forceAsk && location.hostname && location.hostname !== '' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return location.hostname;
    var saved = localStorage.getItem('swimServerHost');
    if (!forceAsk && saved) return saved;
    var def = saved || '192.168.1.100';
    var ip = prompt('请输入服务器IP地址:', def);
    if (ip) { localStorage.setItem('swimServerHost', ip); return ip; }
    return saved || 'localhost';
}
function changeServerHost() { _connFailCount = 0; var h = getServerHost(true); if (ws) try { ws.close(); } catch(e) {} connect(); }
function applyServerHost() {
    var newHost = document.getElementById('dlgServerHost').value.trim();
    if (!newHost) { alert('请输入服务器地址'); return; }
    localStorage.setItem('swimServerHost', newHost);
    _connFailCount = 0;
    closeSettings();
    if (ws) try { ws.close(); } catch(e) {}
    connect();
    addLog('服务器地址已更新: ' + newHost);
}

function connect() {
    var host = getServerHost();
    ws = new WebSocket('ws://' + host + ':3002');
    ws.onopen = function() {
        _connFailCount = 0;
        ws.send(JSON.stringify({type: 'TIMING_WEB_IDENTITY'}));
        document.getElementById('wsConn').className = 'conn-dot on';
        addLog('已连接服务器 ' + host);
    };
    ws.onmessage = function(e) {
        var msg = JSON.parse(e.data);
        if (msg.type === 'STAGE_COMPLETE') {
            // 赛次全部完赛，弹出晋级确认
            var g = msg.gender, ev = msg.eventName, from = msg.fromStage, next = msg.nextStage;
            var total = msg.totalSwimmers, promo = msg.promoCount;
            var answer = confirm(g + ' ' + ev + ' ' + from + ' 全部' + total + '人已完赛！\n\n'
                + '是否自动晋级前' + promo + '名到' + next + '？\n（按成绩总排名）');
            if (answer) {
                ws.send(JSON.stringify({type:'TIMING_CMD', command:'EXECUTE_PROMOTION',
                    data:{gender:g, eventName:ev, fromStage:from, nextStage:next, promoCount:promo}}));
                addLog('已确认晋级：' + g + ' ' + ev + ' → ' + next);
            } else {
                addLog('已取消自动晋级，可在"成绩与排名→晋级处理"中手动操作');
            }
            return;
        }
        if (msg.type === 'PROMOTION_DONE') {
            addLog('晋级完成：' + msg.gender + ' ' + msg.eventName + ' → ' + msg.nextStage
                + '（' + msg.promotedCount + '人，' + msg.heatCount + '组）');
            return;
        }
        data = msg.data || {};
        render();
        // 如果设备管理弹窗打开，刷新面板
        if (!document.getElementById('deviceModal').classList.contains('hidden')) {
            renderDeviceStatusPanel();
        }
    };
    ws.onclose = function() {
        document.getElementById('wsConn').className = 'conn-dot off';
        _connFailCount++;
        if (_connFailCount >= 3) { _connFailCount = 0; if (confirm('连接失败，是否重新设置服务器地址？')) { changeServerHost(); return; } }
        setTimeout(connect, 3000);
    };
}

function sendCmd(cmd, cmdData) {
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({type: 'TIMING_CMD', command: cmd, data: cmdData || null}));
}

function sendDisplay(mode) {
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({type: 'REMOTE_CONTROL', command: mode}));
}

function publishResult() {
    if (!data || !data.schedule || data.schedule.length === 0) { alert('暂无赛程数据'); return; }
    // 收集已完赛的组
    var items = [];
    var sched = data.schedule || [];
    for (var i = 0; i < sched.length; i++) {
        var s = sched[i];
        var confirmed = s.heatConfirmed || [];
        for (var h = 0; h < confirmed.length; h++) {
            if (confirmed[h]) {
                var showHeat = (confirmed.length > 1) || (s.stage||'').indexOf('预赛') >= 0 || (s.stage||'').indexOf('半决赛') >= 0;
                var label = (s.gender||'') + ' ' + (s.eventName||'') + ' ' + (s.stage||'') + (showHeat ? ' 第' + (h+1) + '组' : '');
                items.push({label: label, gender: s.gender, eventName: s.eventName, stage: s.stage, heat: h+1});
            }
        }
    }
    if (items.length === 0) { alert('暂无已完赛的比赛'); return; }
    // 弹出选择框
    var sel = '<select id="pubSelect" style="width:100%;padding:6px;font-size:14px;">';
    for (var j = 0; j < items.length; j++) sel += '<option value="' + j + '">' + items[j].label + '</option>';
    sel += '</select>';
    var dlg = document.createElement('div');
    dlg.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;';
    dlg.innerHTML = '<div style="background:#1E293B;border-radius:8px;padding:20px;min-width:320px;max-width:500px;">' +
        '<h3 style="margin:0 0 12px;color:white;">选择发布成绩</h3>' + sel +
        '<div style="margin-top:14px;text-align:right;">' +
        '<button onclick="this.parentNode.parentNode.parentNode.remove()" style="padding:6px 16px;margin-right:8px;background:#64748B;color:white;border:none;border-radius:4px;cursor:pointer;">取消</button>' +
        '<button id="pubOkBtn" style="padding:6px 16px;background:#F59E0B;color:white;border:none;border-radius:4px;font-weight:bold;cursor:pointer;">发布</button>' +
        '</div></div>';

    document.getElementById('pubOkBtn').onclick = function() {

        var it = items[idx];
        sendCmd('PUBLISH_RESULT', {gender: it.gender, eventName: it.eventName, stage: it.stage, heat: it.heat});
        dlg.remove();

}

function parseServerTime(str) {
    if (!str) return 0;
    var parts = str.split(':');
    if (parts.length === 3) return parseFloat(parts[0])*3600 + parseFloat(parts[1])*60 + parseFloat(parts[2]);
    if (parts.length === 2) return parseFloat(parts[0])*60 + parseFloat(parts[1]);
    return parseFloat(parts[0]) || 0;
}

function formatLocalTime(total) {
    if (total < 0) total = 0;
    var tenths = Math.floor(total * 10) % 10;
    var secs = Math.floor(total) % 60;
    var mins = Math.floor(total / 60) % 60;
    var hrs = Math.floor(total / 3600);
    if (hrs > 0) return hrs + ':' + mins.toString().padStart(2,'0') + ':' + secs.toString().padStart(2,'0') + '.' + tenths;
    if (mins > 0) return mins + ':' + secs.toString().padStart(2,'0') + '.' + tenths;
    return secs + '.' + tenths;
}

function getLocalRunningTime() {
    if (_localTimerStart <= 0) return data.runningTime || '0.0';
    var elapsed = (Date.now() - _localTimerStart) / 1000;
    return formatLocalTime(elapsed);
}

var _rcRefreshTimer = null;
function startRcRefresh() {
    if (_rcRefreshTimer) return;
    _rcRefreshTimer = setInterval(function() {
        var st = (data.raceState || '').toLowerCase();
        if (st === 'racing' || st === 'finished') {
            renderLanes();
            // 滚动时间/第1名成绩交替显示
            var rtEl = document.getElementById('runTime');
            var hMs = firstPlaceHoldTime * 1000;
            if (firstPlaceShowStart > 0 && (Date.now() - firstPlaceShowStart) < hMs && firstPlaceFinishTime) {
                rtEl.textContent = firstPlaceFinishTime;
                rtEl.style.color = '#22c55e';
            } else {
                rtEl.textContent = getLocalRunningTime();
                rtEl.style.color = '';
            }
        }
    }, 500);
}

function render() {
    var state = (data.raceState || 'WAITING').toLowerCase();
    // 比赛中/已完赛 启动定时刷新（分段消隐）
    if (state === 'racing' || state === 'finished') startRcRefresh();
    // 等待/就位 重置分段跟踪
    if (state === 'waiting') { laneSplitState = {}; laneReactionState = {}; }

    document.getElementById('stateDot').className = 'state-dot ' + state;
    var labels = {waiting:'等待', ready:'就位', racing:'比赛中', finished:'已完赛'};
    var stateText = labels[state] || state;
    if (data.resultConfirmed) stateText = '已确认 — 请选择下一组';
    document.getElementById('stateLabel').textContent = stateText;

    // 本地计时器同步：只在首次进入racing时根据服务器时间计算发令时刻，之后完全本地独立计时
    if (state === 'waiting' || state === 'ready') {
        _localTimerStart = 0;
        _localTimerSynced = false;
    }
    if ((state === 'racing' || state === 'finished') && !_localTimerSynced && data.runningTime) {
        var serverSec = parseServerTime(data.runningTime);
        _localTimerStart = Date.now() - serverSec * 1000;  // 反推发令时刻
        _localTimerSynced = true;
    }
    // 第1名检测
    if (state === 'waiting') {
        firstPlaceDetectedRank = 0;
        firstPlaceShowStart = 0;
        firstPlaceFinishTime = '';
    }
    var swimmers = data.swimmers || [];
    var leader = null, leaderSplitCount = 0;
    for (var fi = 0; fi < swimmers.length; fi++) {
        var fSw = swimmers[fi];
        if (fSw.status) continue;
        var sc = (fSw.splits && fSw.splits.length) ? fSw.splits.length : 0;
        if (fSw.isFinished) sc = 9999;
        if (sc > leaderSplitCount || (sc === leaderSplitCount && leader && fSw.rank > 0 && fSw.rank < (leader.rank || 99))) {
            leaderSplitCount = sc;
            leader = fSw;
        }
    }
    if (leader) {
        var leaderSc = (leader.splits && leader.splits.length) ? leader.splits.length : 0;
        if (leader.isFinished && leader.finalTime) leaderSc = -1;
        if (leaderSc !== firstPlaceDetectedRank) {
            firstPlaceDetectedRank = leaderSc;
            if (leader.isFinished && leader.finalTime) {
                firstPlaceFinishTime = leader.finalTime;
            } else if (leader.splits && leader.splits.length > 0) {
                firstPlaceFinishTime = leader.splits[leader.splits.length - 1].cumulative || '';
            }
            if (firstPlaceFinishTime) firstPlaceShowStart = Date.now();
        }
    }
    // 右下角：停留期间显示第1名成绩（绿色），否则显示滚动时间（金色）
    var runTimeEl = document.getElementById('runTime');
    var holdMs = firstPlaceHoldTime * 1000;
    if (firstPlaceShowStart > 0 && (Date.now() - firstPlaceShowStart) < holdMs && firstPlaceFinishTime) {
        runTimeEl.textContent = firstPlaceFinishTime;
        runTimeEl.style.color = '#22c55e';
    } else {
        runTimeEl.textContent = getLocalRunningTime();
        runTimeEl.style.color = '';
    }

    var ro = data.scoringControlMode === 'remote_exe';
    document.getElementById('readonlyOverlay').classList.toggle('hidden', !ro);
    document.getElementById('controlMode').textContent = '控制模式: ' + (data.scoringControlMode || '-');

    // 当前比赛信息
    var info = (data.currentGender||'') + '子 ' + (data.currentEvent||'') + ' ' + (data.currentStage||'') + ' 第' + (data.currentHeat||0) + '/' + (data.totalHeats||0) + '组';
    document.getElementById('currentInfo').textContent = info;

    // 先同步参数（发令位置等），再渲染界面
    if (data.laneCloseSettings) {
        if (data.laneCloseSettings.startPosition) startPosition = data.laneCloseSettings.startPosition;
        if (data.laneCloseSettings.finishPosition) finishPosition = data.laneCloseSettings.finishPosition;
        if (document.getElementById('settingsModal').classList.contains('hidden')) {
            document.getElementById('dlgCloseTime').value = data.laneCloseSettings.laneCloseTime;
            document.getElementById('dlgSBDelay').value = data.laneCloseSettings.startBlockCloseDelay;
            document.getElementById('dlgConfDelay').value = data.laneCloseSettings.resultConfirmCloseDelay;
            document.getElementById('dlgFSThresh').value = data.laneCloseSettings.falseStartThreshold;
            document.getElementById('dlgSplitDisp').value = data.laneCloseSettings.splitDisplayTime;
        }
    }

    renderScheduleTree();
    renderHeader();
    renderLanes();
    renderStartListBar();
    updateTimingSourceInfo();
}

function getLaneInput() {
    var v = parseInt(document.getElementById('laneInput').value);
    return isNaN(v) ? -1 : v;
}
function markLane(status) {
    var lane = getLaneInput();
    if (lane < 0) { alert('请输入泳道号'); return; }
    if (confirm('确定将泳道 ' + lane + ' 标记为 ' + status + '？')) {
        sendCmd('MARK_' + status, {lane: lane});
        addLog('泳道' + lane + ' 标记为 ' + status);
    }
}
function manualTimeInput() {
    var lane = getLaneInput();
    if (lane < 0) { alert('请输入泳道号'); return; }
    var timeStr = prompt('泳道 ' + lane + ' 手动输入成绩（如 49.23 或 1:23.45）：');
    if (!timeStr) return;
    var seconds = parseTimeToSeconds(timeStr);
    if (seconds <= 0) { alert('成绩格式不正确'); return; }
    sendCmd('OVERRIDE_TIME', {lane: lane, time: seconds});
    addLog('泳道' + lane + ' 手动输入成绩: ' + timeStr);
}
function parseTimeToSeconds(str) {
    str = str.trim();
    if (str.indexOf(':') >= 0) {
        var parts = str.split(':');
        var min = parseFloat(parts[0]) || 0;
        var sec = parseFloat(parts[1]) || 0;
        return min * 60 + sec;
    }
    var v = parseFloat(str);
    return isNaN(v) ? 0 : v;
}

function renderDeviceStatusPanel() {
    var panel = document.getElementById('deviceStatusPanel');
    // 从独立的laneDevices字段读取设备状态（不依赖swimmers）
    var laneDevices = data.laneDevices || [];
    var pool = data.poolConfig || {};

    if (laneDevices.length === 0) {
        // 没有laneDevices数据时，用泳池配置生成空行
        var laneNumbers = pool.laneNumbers || [];
        if (laneNumbers.length === 0) {
            var count = pool.lanes || 10;
            for (var i = (count === 10 ? 0 : 1); i < (count === 10 ? 10 : count + 1); i++) laneNumbers.push(i);
        }
        for (var i = 0; i < laneNumbers.length; i++) {
            laneDevices.push({lane: laneNumbers[i]});
        }
    }

    var html = '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
    html += '<tr style="background:#1E293B;"><th style="padding:6px;border:1px solid #475569;color:#94A3B8;">道次</th>';
    for (var d = 0; d < deviceNames.length; d++) {
        html += '<th style="padding:6px;border:1px solid #475569;color:#94A3B8;white-space:nowrap;">' + deviceNames[d].label + '</th>';
    }
    html += '</tr>';

    for (var n = 0; n < laneDevices.length; n++) {
        var ld = laneDevices[n];
        var lane = ld.lane;
        html += '<tr>';
        html += '<td style="padding:6px;border:1px solid #475569;text-align:center;font-weight:bold;font-size:15px;">' + lane + '</td>';
        for (var d = 0; d < deviceNames.length; d++) {
            var broken = ld[deviceNames[d].key + 'Broken'] === true;
            var bgColor = broken ? '#7F1D1D' : '#14532D';
            var text = broken ? '坏' : '好';
            html += '<td style="padding:4px;border:1px solid #475569;text-align:center;background:' + bgColor + ';">';
            html += '<span style="cursor:pointer;color:white;font-weight:bold;font-size:13px;" ';
            html += 'onclick="toggleDevice(' + lane + ',\'' + deviceNames[d].key + '\',' + (!broken) + ')">' + text + '</span>';
            html += '</td>';
        }
        html += '</tr>';
    }
    html += '</table>';
    panel.innerHTML = html;
}

function toggleDevice(lane, device, broken) {
    sendCmd('SET_DEVICE_STATUS', {lane: lane, device: device, status: broken ? 'broken' : 'good'});
    addLog('泳道' + lane + ' ' + device + ' → ' + (broken ? '损坏' : '正常'));
    // 本地立即更新laneDevices（不等服务器广播）
    var ld = data.laneDevices || [];
    for (var i = 0; i < ld.length; i++) {
        if (ld[i].lane === lane) { ld[i][device + 'Broken'] = broken; break; }
    }
    renderDeviceStatusPanel();
}

function setAllDevices(broken) {
    var ld = data.laneDevices || [];
    for (var i = 0; i < ld.length; i++) {
        for (var d = 0; d < deviceNames.length; d++) {
            sendCmd('SET_DEVICE_STATUS', {lane: ld[i].lane, device: deviceNames[d].key, status: broken ? 'broken' : 'good'});
            ld[i][deviceNames[d].key + 'Broken'] = broken;
        }
    }
    renderDeviceStatusPanel();
    addLog(broken ? '全部设备设为损坏' : '全部设备设为正常');
}

// ═══════ 赛程树 ═══════
var treeCollapsed = {}; // session number -> collapsed state

function renderScheduleTree() {
    var container = document.getElementById('scheduleTree');
    var schedule = data.schedule || [];
    if (schedule.length === 0) { container.innerHTML = '<div style="padding:10px;color:var(--dim);font-size:11px;">暂无赛程</div>'; return; }

    // 按单元分组
    var sessions = {};
    for (var i = 0; i < schedule.length; i++) {
        var s = schedule[i];
        var sn = s.session || 1;
        if (!sessions[sn]) sessions[sn] = { name: s.sessionName || ('第'+sn+'单元'), events: [] };
        sessions[sn].events.push(s);
    }

    var html = '';
    for (var sn in sessions) {
        var sess = sessions[sn];
        // 检查单元内是否全部完赛
        var sessionAllDone = true;
        for (var j2 = 0; j2 < sess.events.length; j2++) {
            if (sess.events[j2].allConfirmed !== true) { sessionAllDone = false; break; }
        }
        // 已完赛单元自动收起（除非用户手动展开过）
        if (sessionAllDone && treeCollapsed[sn] === undefined) treeCollapsed[sn] = true;
        var collapsed = treeCollapsed[sn] === true;

        html += '<div class="tree-session">';
        html += '<div class="tree-session-header" onclick="toggleSession('+sn+')">';
        html += '<span class="arrow">' + (collapsed ? '▶' : '▼') + '</span> ' + sess.name;
        if (sessionAllDone) html += ' <span style="color:#64748b;font-size:11px;">[已完赛]</span>';
        html += '</div>';
        if (!collapsed) {
            for (var j = 0; j < sess.events.length; j++) {
                var ev = sess.events[j];
                var evLabel = (ev.gender||'') + ' ' + (ev.eventName||'') + ' ' + (ev.stage||'');
                var allDone = ev.allConfirmed === true;
                var heatDone = ev.heatConfirmed || [];

                if (allDone) {
                    // 已完赛项目：点击可展开/收起
                    var evKey = 'ev_' + sn + '_' + j;
                    var evCollapsed = treeCollapsed[evKey] !== false; // 默认收起
                    html += '<div class="tree-event" style="color:#aaa;cursor:pointer;" onclick="toggleSession(\'' + evKey + '\')">';
                    html += '<span style="font-size:10px;margin-right:2px;">' + (evCollapsed ? '▶' : '▼') + '</span>' + evLabel + ' [已完赛]</div>';
                    if (!evCollapsed) {
                        var hc2 = ev.heatCount || 1;
                        for (var h2 = 1; h2 <= hc2; h2++) {
                            html += '<div class="tree-heat" style="color:#aaa;cursor:default;pointer-events:none;">第' + h2 + '组 [已完赛]</div>';
                        }
                    }
                } else {
                    html += '<div class="tree-event">' + evLabel + '</div>';
                    var hc = ev.heatCount || 1;
                    for (var h = 1; h <= hc; h++) {
                        var confirmed = heatDone[h-1] === true;
                        var key = (ev.gender||'') + '|' + (ev.eventName||'') + '|' + (ev.stage||'') + '|' + h;
                        var active = (key === selectedHeatKey) ? ' active' : '';
                        if (!selectedHeatKey && data.currentGender === ev.gender && data.currentEvent === ev.eventName && data.currentStage === ev.stage && data.currentHeat === h) {
                            active = ' active';
                        }
                        if (confirmed) {
                            html += '<div class="tree-heat" style="color:#aaa;cursor:default;pointer-events:none;">第' + h + '组 [已完赛]</div>';
                        } else {
                            html += '<div class="tree-heat' + active + '" onclick="selectHeat(\'' + key.replace(/'/g,"\\'") + '\')">第' + h + '组 (共' + hc + '组)</div>';
                        }
                    }
                }
            }
        }
        html += '</div>';
    }
    container.innerHTML = html;
}

function toggleSession(sn) {
    // 对于已完赛项目，默认是收起（undefined视为true），点击切换为展开(false)
    treeCollapsed[sn] = treeCollapsed[sn] === undefined ? false : !treeCollapsed[sn];
    renderScheduleTree();
}

function selectHeat(key) {
    selectedHeatKey = key;
    var parts = key.split('|');
    if (parts.length >= 4) {
        var gender = parts[0], eventName = parts[1], stage = parts[2], heat = parseInt(parts[3]);
        sendCmd('SET_GENDER', gender);
        sendCmd('SET_EVENT', eventName);
        sendCmd('SET_STAGE', stage);
        sendCmd('SET_HEAT', heat);
        addLog('选择: ' + gender + ' ' + eventName + ' ' + stage + ' 第' + heat + '组');
    }
    renderScheduleTree();
}

function renderHeader() {

    var leftInd = startPosition === 'left' ? '▶' : '';
    var rightInd = startPosition === 'right' ? '◀' : '';

    var rightColor = startPosition === 'right' ? 'color:#22c55e;' : '';
    h.innerHTML =
        '<div class="start-ind" style="width:8px;text-align:center;font-size:12px;' + leftColor + '">' + leftInd + '</div>' +
        '<div class="left-devices devices">' +
            '<span class="device-label-btn" style="font-size:16px;">[T]</span>' +
            '<span class="device-label">盲1</span>' +
            '<span class="device-label">盲2</span>' +
            '<span class="device-label">盲3</span>' +
            '<span class="device-label">出发</span>' +
            '<span class="device-label">触板</span>' +
            '<span class="device-label" style="width:20px;">圈数</span>' +
        '</div>' +
        '<div class="lane-mid" style="padding:0 8px;">' +
            '<div class="lane-num" style="font-size:11px;">道</div>' +
            '<div class="swimmer-info" style="font-size:11px;">姓名/代表队</div>' +
            '<div class="lane-track" style="font-size:16px;height:auto;background:none;text-align:center;">方向/进度</div>' +
        '</div>' +
        '<div class="right-devices devices">' +
            '<span class="device-label" style="width:20px;">圈数</span>' +
            '<span class="device-label">触板</span>' +
            '<span class="device-label">出发</span>' +
            '<span class="device-label">盲1</span>' +
            '<span class="device-label">盲2</span>' +
            '<span class="device-label">盲3</span>' +
            '<span class="device-label-btn" style="font-size:16px;">[T]</span>' +
        '</div>' +
        '<div class="start-ind" style="width:8px;text-align:center;font-size:12px;' + rightColor + '">' + rightInd + '</div>' +
        '<div class="info-area" style="font-family:inherit;">' +
            '<div class="reaction" style="font-size:16px;">反应</div>' +
            '<div class="final-time" style="font-size:16px;font-weight:normal;">成绩</div>' +
            '<div class="rank" style="font-size:16px;font-weight:normal;">名次</div>' +
            '<div style="width:35px;text-align:center;font-size:16px;margin-left:8px;">备注</div>' +
        '</div>';
}

// ═══════ 泳道渲染 ═══════
function getReactionDisplay(sw) {
    var rt = sw.reactionTime || '';
    if (!rt) return '';
    var lane = sw.lane;
    if (!laneReactionState[lane]) laneReactionState[lane] = {value: '', showTime: 0};
    var rs = laneReactionState[lane];
    // 检测反应时间出现
    if (rt !== rs.value) {
        rs.value = rt;
        rs.showTime = Date.now();
    }
    if (rs.showTime > 0) {
        var displayMs = ((data.laneCloseSettings ? data.laneCloseSettings.splitDisplayTime : 5) || 5) * 1000;
        if ((Date.now() - rs.showTime) < displayMs) return rt;
    }
    return '';
}

function getSplitOrFinalTime(sw) {
    // 已完赛或有最终成绩：永久显示
    if (sw.finalTime) return sw.finalTime;
    // DNS/DNF/DSQ
    if (sw.status) return sw.status;

    var lane = sw.lane;
    var curSplitCount = (sw.splits && sw.splits.length) ? sw.splits.length : 0;

    if (!laneSplitState[lane]) laneSplitState[lane] = {splitCount: 0, showTime: 0};
    var ls = laneSplitState[lane];

    // 检测新分段到来
    if (curSplitCount > ls.splitCount) {
        ls.splitCount = curSplitCount;
        ls.showTime = Date.now();
    }

    // 在显示时间窗口内显示分段成绩：累计时间为主，分段时间为辅
    if (curSplitCount > 0 && ls.showTime > 0) {
        var displayMs = ((data.laneCloseSettings ? data.laneCloseSettings.splitDisplayTime : 5) || 5) * 1000;
        var elapsed = Date.now() - ls.showTime;
        if (elapsed < displayMs) {
            var lastSplit = sw.splits[curSplitCount - 1];
            return lastSplit.cumulative || '';
        }
    }
    return '';
}

function getRelayCurrentLegName(sw) {
    var names = (sw.name||'').split(',');
    if (names.length <= 1) return sw.name || '';
    // 根据当前段数计算第几棒
    var currentLap = sw.currentLap || 0;
    var ev = data.currentEvent || '';
    var m = ev.match(/(\d+)\s*[x×]\s*(\d+)/);
    var legCount = m ? parseInt(m[1]) : 4;
    var legDist = m ? parseInt(m[2]) : 100;
    var poolLen = (data.poolConfig && data.poolConfig.length) ? data.poolConfig.length : 50;
    var lapsPerLeg = Math.max(1, Math.floor(legDist / poolLen));
    var currentLeg = Math.floor(currentLap / lapsPerLeg);  // 0-based
    if (currentLeg >= legCount) currentLeg = legCount - 1;
    if (currentLeg < 0) currentLeg = 0;
    // 完赛时显示最后一棒
    if (sw.isFinished) currentLeg = legCount - 1;
    var legName = (currentLeg < names.length) ? names[currentLeg].trim() : names[0].trim();
    return '第' + (currentLeg + 1) + '棒: ' + legName;
}

function renderLanes() {
    var container = document.getElementById('poolLanes');
    container.innerHTML = '';
    var swimmers = data.swimmers || [];
    var rcRelay = (data.currentEvent||'').indexOf('接力') >= 0;

    for (var i = 0; i < swimmers.length; i++) {
        var sw = swimmers[i];
        var ds = sw.deviceStatus || {};
        var row = document.createElement('div');
        row.className = 'lane-row' + (sw.isFalseStart ? ' false-start' : '') + (sw.lane === selectedLane ? ' selected' : '');
        row.onclick = (function(lane) { return function() { selectLane(lane); }; })(sw.lane);

        var totalLaps = 1;
        var ev = data.currentEvent || '';
        var m = ev.match(/(\d+)/);
        if (m) totalLaps = Math.max(1, parseInt(m[1]) / ((data.poolConfig||{}).length||50));
        var currentLap = sw.currentLap || 0;
        var progress = totalLaps > 0 ? Math.min(100, (currentLap / totalLaps) * 100) : 0;
        if (sw.isFinished) progress = 100;
        // 方向由服务器根据发令位置设置
        var swDir = sw.direction || (startPosition === 'left' ? '→' : '←');
        var dir = (swDir === '←') ? 'returning' : 'going';

        var rankClass = '';
        if (sw.rank === 1) rankClass = 'r1';
        else if (sw.rank === 2) rankClass = 'r2';
        else if (sw.rank === 3) rankClass = 'r3';

        var closeText = sw.laneCloseCountdown > 0 ? '(' + sw.laneCloseCountdown.toFixed(1) + 's)' : '';

        // 发令位置指示灯
        var leftIndClass = startPosition === 'left' ? 'start-indicator active' : 'start-indicator inactive';
        var rightIndClass = startPosition === 'right' ? 'start-indicator active' : 'start-indicator inactive';

        var leftRemain = (sw.leftTouchRemain != null) ? sw.leftTouchRemain : '';
        var rightRemain = (sw.rightTouchRemain != null) ? sw.rightTouchRemain : '';
        var leftRemainStyle = 'display:inline-block;width:22px;text-align:center;font-size:18px;font-weight:bold;color:' + (leftRemain > 0 ? '#F59E0B' : '#475569') + ';';
        var rightRemainStyle = 'display:inline-block;width:22px;text-align:center;font-size:18px;font-weight:bold;color:' + (rightRemain > 0 ? '#F59E0B' : '#475569') + ';';

        row.innerHTML =
            '<div class="' + leftIndClass + ' start-ind"></div>' +
            '<div class="left-devices devices">' +
                '<button class="touch-btn" onclick="event.stopPropagation();manualTouch('+sw.lane+',\'left\')" title="左端手动触板">T</button>' +
                '<div class="device-dot ' + statusClass(ds.leftBlindWatch1) + '" title="盲表1"></div>' +
                '<div class="device-dot ' + statusClass(ds.leftBlindWatch2) + '" title="盲表2"></div>' +
                '<div class="device-dot ' + statusClass(ds.leftBlindWatch3) + '" title="盲表3"></div>' +
                '<div class="device-dot ' + statusClass(ds.leftStartBlock) + '" title="出发台"></div>' +
                '<div class="device-dot ' + statusClass(ds.leftTouchpad) + '" title="触板"></div>' +
                '<span style="' + leftRemainStyle + '" title="左端触板剩余">' + (leftRemain !== '' ? leftRemain : '') + '</span>' +
            '</div>' +
            '<div class="lane-mid">' +
                '<div class="lane-num">' + sw.lane + '</div>' +
                '<div class="swimmer-info"><div class="name">' + (rcRelay ? (sw.country||'') : (sw.name||'')) + '</div><div class="team">' + (rcRelay ? getRelayCurrentLegName(sw) : (sw.country||'')) + '</div></div>' +
                '<div class="lane-track ' + dir + '">' + buildArrows(sw, swDir, dir) + '</div>' +
            '</div>' +
            '<div class="right-devices devices">' +
                '<span style="' + rightRemainStyle + '" title="右端触板剩余">' + (rightRemain !== '' ? rightRemain : '') + '</span>' +
                '<div class="device-dot ' + statusClass(ds.rightTouchpad) + '" title="触板"></div>' +
                '<div class="device-dot ' + statusClass(ds.rightStartBlock) + '" title="出发台"></div>' +
                '<div class="device-dot ' + statusClass(ds.rightBlindWatch1) + '" title="盲表1"></div>' +
                '<div class="device-dot ' + statusClass(ds.rightBlindWatch2) + '" title="盲表2"></div>' +
                '<div class="device-dot ' + statusClass(ds.rightBlindWatch3) + '" title="盲表3"></div>' +
                '<button class="touch-btn" onclick="event.stopPropagation();manualTouch('+sw.lane+',\'right\')" title="右端手动触板">T</button>' +
            '</div>' +
            '<div class="' + rightIndClass + ' start-ind"></div>' +
            '<div class="info-area">' +
                '<div class="reaction">' + getReactionDisplay(sw) + '</div>' +
                '<div class="final-time">' + getSplitOrFinalTime(sw) + '</div>' +
                '<div class="rank ' + rankClass + '">' + (sw.rank>0 ? sw.rank : '') + '</div>' +
                '<div style="width:35px;text-align:center;font-size:20px;font-weight:bold;color:#EF4444;margin-left:8px;">' + (sw.isFalseStart ? 'DSQ' : (sw.status || '')) + '</div>' +
            '</div>';

        container.appendChild(row);
    }
}

function buildArrows(sw, swDir, dir) {
    // 完赛：显示完成标志
    if (sw.isFinished) {
        var ft = sw.finalTime || sw.status || '';
        return '<span class="arrows finished">== ' + ft + ' ==</span>';
    }
    // DNS/DNF/DSQ
    if (sw.status === 'DNS' || sw.status === 'DNF' || sw.status === 'DSQ') {
        return '<span class="arrows finished">' + sw.status + '</span>';
    }

    var countdown = sw.laneCloseCountdown || 0;
    var closeTime = (data.laneCloseSettings ? data.laneCloseSettings.laneCloseTime : 20) || 20;
    var arrow = swDir === '←' ? '◀' : '▶';

    var maxArrows = 12;

    if (countdown > 0) {
        // 泳道关闭中：根据进度比例计算箭头数量（倒计时结束时满箭头）
        var elapsed = closeTime - countdown;
        var progress = closeTime > 0 ? elapsed / closeTime : 1;
        var arrowCount = Math.max(1, Math.round(progress * maxArrows));
        if (arrowCount > maxArrows) arrowCount = maxArrows;

        var arrows = '';
        for (var i = 0; i < arrowCount; i++) arrows += arrow;
        var countdownText = '(' + countdown.toFixed(1) + 's)';

        if (dir === 'going') {
            return '<span class="arrows">' + arrows + '</span><span style="color:var(--gold);font-size:11px;margin-left:4px;">' + countdownText + '</span>';
        } else {
            return '<span style="color:var(--gold);font-size:11px;margin-right:4px;">' + countdownText + '</span><span class="arrows">' + arrows + '</span>';
        }
    }

    // 倒计时结束或比赛进行中：保留满箭头直到触板触碰改变方向
    if (sw.currentLap > 0 || (data.raceState && data.raceState.toLowerCase() === 'racing')) {
        var fullArrows = '';
        for (var i = 0; i < maxArrows; i++) fullArrows += arrow;
        return '<span class="arrows">' + fullArrows + '</span>';
    }

    // 等待状态
    return '';
}

function statusClass(s) {
    if (!s) return 'closed';
    if (s === 'open') return 'open';
    if (s === 'broken') return 'broken';
    if (s === 'falsestart') return 'falsestart';
    if (s === 'notinstalled') return 'notinstalled';
    return 'closed';
}

var _lastTsSplitCount = -1;

function selectLane(lane) {
    selectedLane = lane;
    _lastTsSplitCount = -1; // 切换泳道强制重建下拉框
    // 同步泳道操作处的道次号
    var laneInput = document.getElementById('laneInput');
    if (laneInput) laneInput.value = lane;
    updateTimingSourceInfo();
    renderLanes();
}

function updateTimingSourceInfo() {
    if (selectedLane < 0 || !data || !data.swimmers) {
        document.getElementById('timingSourceCompare').innerHTML = '<span style="color:#64748B;">点击泳道行查看计时源</span>';
        return;
    }
    var swimmers = data.swimmers || [];
    for (var i = 0; i < swimmers.length; i++) {
        var sw = swimmers[i];
        if (sw.lane !== selectedLane) continue;

        var splits = sw.splits || [];
        var splitCount = splits.length;
        var combo = document.getElementById('splitSelectCombo');

        // 只在分段数量变化时重建下拉框
        if (splitCount !== _lastTsSplitCount) {
            _lastTsSplitCount = splitCount;
            var prevIdx = combo.selectedIndex;
            combo.innerHTML = '<option value="0">终点</option>';
            for (var j = 0; j < splitCount; j++) {
                var sp = splits[j];
                combo.innerHTML += '<option value="' + (j+1) + '">第' + sp.lap + '段(' + sp.distance + 'm)</option>';
            }
            if (prevIdx >= 0 && prevIdx < combo.options.length) combo.selectedIndex = prevIdx;
            else combo.selectedIndex = 0;
        }
        showTimingSourceData();
        break;
    }
}

function showTimingSourceData() {
    if (selectedLane < 0 || !data || !data.swimmers) return;
    var swimmers = data.swimmers || [];
    var combo = document.getElementById('splitSelectCombo');
    var selIdx = combo ? combo.selectedIndex : 0;

    for (var i = 0; i < swimmers.length; i++) {
        var sw = swimmers[i];
        if (sw.lane !== selectedLane) continue;

        var splits = sw.splits || [];
        var html = '<b>道' + selectedLane + '  ' + (sw.name||'') + '</b><br>';

        if (selIdx <= 0) {
            // 终点：反应时间、触板、盲表1/2/3、手动
            html += '<b>【终点】</b><br>';
            var rt = sw.reactionTime || '';
            html += '反应时间: ' + (rt || '-') + '<br>';
            var ts = sw.timingSources;
            if (ts) {
                html += '触&nbsp;&nbsp;板: ' + (ts.touchpad || '-') + '<br>';
                html += '盲表 1: ' + (ts.blindWatch1 || '-') + '<br>';
                html += '盲表 2: ' + (ts.blindWatch2 || '-') + '<br>';
                html += '盲表 3: ' + (ts.blindWatch3 || '-') + '<br>';
                var manual = ts.manual || '';
                if (!manual) manual = (finishPosition === 'right') ? (ts.manualTouchRight||'') : (ts.manualTouchLeft||'');
                html += '手&nbsp;&nbsp;动: ' + (manual || '-') + '<br>';
            }
        } else if (selIdx - 1 < splits.length) {
            // 分段：反应时间(若有)、触板、盲表1/2/3、手动、计时源
            var sp = splits[selIdx - 1];
            html += '<b>【第' + sp.lap + '段  ' + sp.distance + 'm】</b><br>';
            var spReact = sw.reactionTime || '';
            if (spReact) html += '反应时间: ' + spReact + '<br>';
            html += '触&nbsp;&nbsp;板: ' + (sp.touchpad || '-') + '<br>';
            html += '盲表 1: ' + (sp.blind1 || '-') + '<br>';
            html += '盲表 2: ' + (sp.blind2 || '-') + '<br>';
            html += '盲表 3: ' + (sp.blind3 || '-') + '<br>';
            html += '手&nbsp;&nbsp;动: ' + (sp.manual || '-') + '<br>';
            html += '计时源: ' + (sp.source || '-') + '<br>';
        }
        document.getElementById('timingSourceCompare').innerHTML = html;
        break;
    }
}

function manualTouch(lane, side) {
    sendCmd(side === 'left' ? 'MANUAL_TOUCH_LEFT' : 'MANUAL_TOUCH_RIGHT', {lane: lane});
    addLog('手动触板: 道' + lane + ' ' + side);
}

function renderStartListBar() {
    var sl = document.getElementById('startList');
    var html = '<b>出发表:</b> ';
    var swimmers = data.swimmers || [];
    var slbRelay = (data.currentEvent||'').indexOf('接力') >= 0;
    for (var i = 0; i < swimmers.length; i++) {
        var slbLabel = slbRelay ? (swimmers[i].country||'') : (swimmers[i].name||'');
        html += '道' + swimmers[i].lane + '-' + slbLabel + '(' + (swimmers[i].entryTime||'') + ') ';
    }
    sl.innerHTML = html;
}

function addLog(msg) {
    var el = document.getElementById('logArea');
    var now = new Date();
    var time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
    el.innerHTML += '[' + time + '] ' + msg + '<br>';
    el.scrollTop = el.scrollHeight;
}

// 键盘快捷键
document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    switch(e.key) {
        case 'F5': e.preventDefault(); sendCmd('READY'); break;
        case 'F6': e.preventDefault(); sendCmd('START_RACE'); break;
        case 'F7': e.preventDefault(); confirmTimerReset(); break;
        case 'Enter': confirmResult(); break;
    }
    if (e.shiftKey && e.key >= '0' && e.key <= '9') {
        sendCmd('MANUAL_TOUCH_LEFT', {lane: e.key === '0' ? 10 : parseInt(e.key)});
    }
    if (e.ctrlKey && e.key >= '0' && e.key <= '9') {
        e.preventDefault();
        sendCmd('MANUAL_TOUCH_RIGHT', {lane: e.key === '0' ? 10 : parseInt(e.key)});
    }
    if (e.ctrlKey && e.key === 'ArrowLeft') sendCmd('PREV_HEAT');
    if (e.ctrlKey && e.key === 'ArrowRight') sendCmd('NEXT_HEAT');
    if (!e.shiftKey && !e.ctrlKey && e.key >= '1' && e.key <= '9') selectLane(parseInt(e.key));
    if (!e.shiftKey && !e.ctrlKey && e.key === '0') selectLane(0);
    if (e.key === 'd' || e.key === 'D') { if (selectedLane >= 0) sendCmd('MARK_DNS', {lane: selectedLane}); }
    if (e.key === 'f') { if (selectedLane >= 0) sendCmd('MARK_DNF', {lane: selectedLane}); }
    if (e.key === 'q' || e.key === 'Q') { if (selectedLane >= 0) sendCmd('MARK_DSQ', {lane: selectedLane}); }
});

connect();
</script>
