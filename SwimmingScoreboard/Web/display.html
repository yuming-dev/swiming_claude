<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">
<title>大屏幕</title>
<style>
:root {
    --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --dim: #94a3b8;
    --gold: #f59e0b; --accent: #3b82f6; --red: #ef4444; --green: #22c55e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; height: 100vh; }

.page-header {
    height: 11vh; display: flex; align-items: center; justify-content: center;
    padding: 0 3vw; position: relative;
    background: linear-gradient(135deg, #1e293b, #0f172a);
}
.page-header .title { font-size: 3.5vh; font-weight: bold; }
.header-records { position: absolute; right: 3vw; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: flex-end; gap: 0.3vh; }
.record-item { font-size: 2.6vh; font-family: 'Consolas', monospace; color: var(--dim); }
.rec-label { color: var(--gold); font-weight: bold; margin-right: 0.5vw; }

/* 比赛视图 */
.race-view { height: 89vh; padding: 1vh 2vw; display: flex; flex-direction: column; }
.race-info { display: flex; justify-content: space-between; align-items: center; height: 6vh; margin-bottom: 0.5vh; border-bottom: 3px solid var(--accent); padding-bottom: 0.5vh; }
.lanes-header { display: flex; align-items: center; padding: 0 1.5vw; height: 3.5vh; color: var(--dim); font-size: 2.9vh; }
.race-info .event-left { display: flex; align-items: baseline; gap: 1.5vw; }
.race-info .event-name { font-size: 2.8vh; font-weight: bold; }
.race-info .stage-heat { font-size: 2.8vh; color: var(--dim); }
.race-info .running-time { font-size: 4vh; font-weight: bold; color: var(--gold); font-family: 'Consolas', monospace; }

.lanes-container { flex: 1; display: flex; flex-direction: column; gap: 0.4vh; }
.lane-row {
    flex: 1; display: flex; align-items: center; background: var(--card); border-radius: 0.5vh;
    padding: 0 1.5vw; position: relative; overflow: hidden; min-height: 0;
}
.lane-row.finished { border-left: 4px solid var(--green); }
.lane-row.dns { opacity: 0.4; }
.lane-row.dsq { border-left: 4px solid var(--red); }
.lane-row .lane-num { width: 5vw; font-size: 2.5vh; font-weight: bold; color: var(--dim); text-align: center; margin-right: 1vw; }
.lane-row .swimmer-name { width: 14vw; font-size: 2.9vh; font-weight: bold; white-space: nowrap; overflow: hidden; margin-right: 1.5vw; text-align: center; }
.lane-row .swimmer-team { width: 12vw; font-size: 2.9vh; color: var(--dim); white-space: nowrap; overflow: hidden; margin-right: 1.5vw; text-align: center; }
.lane-row .result-time { width: 14vw; font-size: 2.9vh; font-weight: bold; text-align: center; font-family: 'Consolas', monospace; margin-right: 1.5vw; }
.lane-row .rank { width: 5vw; font-size: 2.9vh; font-weight: bold; text-align: center; margin-right: 1vw; }
.lane-row .rank.gold { color: var(--gold); }
.lane-row .rank.silver { color: #c0c0c0; }
.lane-row .rank.bronze { color: #cd7f32; }
.lane-row .remark { width: 8vw; font-size: 2.9vh; color: var(--red); text-align: center; }

/* 列表视图 */
.list-container { height: 89vh; padding: 2vh 3vw; overflow: hidden; position: relative; }
.page-indicator { position: absolute; bottom: 1vh; right: 3vw; font-size: 1.8vh; color: var(--dim); }
.list-table { width: 100%; border-collapse: collapse; }
.list-table th { background: var(--card); padding: 1.8vh 1.5vw; text-align: left; font-size: 3vh; border-bottom: 2px solid var(--accent); }
.list-table td { padding: 1.5vh 1.5vw; font-size: 3vh; border-bottom: 1px solid #334155; }
.list-table tr:hover { background: rgba(59,130,246,0.1); }

/* 欢迎画面 */
.center-msg { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.hero-text { font-size: 6vh; font-weight: bold; margin-bottom: 2vh; }
.sub-text { font-size: 3vh; color: var(--dim); }

/* 颁奖 */
.award-container { height: 89vh; display: flex; align-items: flex-end; justify-content: center; gap: 3vw; padding-bottom: 5vh; }
.podium-card { display: flex; flex-direction: column; align-items: center; padding: 3vh 2vw; border-radius: 1vh; animation: reveal 0.8s ease-out forwards; opacity: 0; }
.podium-card.gold { background: linear-gradient(180deg, #f59e0b22, #f59e0b11); border: 2px solid var(--gold); height: 55vh; animation-delay: 2.5s; }
.podium-card.silver { background: linear-gradient(180deg, #c0c0c022, #c0c0c011); border: 2px solid #c0c0c0; height: 45vh; animation-delay: 1.2s; }
.podium-card.bronze { background: linear-gradient(180deg, #cd7f3222, #cd7f3211); border: 2px solid #cd7f32; height: 40vh; animation-delay: 0.2s; }
.podium-card .medal { font-size: 5vh; margin-bottom: 1vh; }
.podium-card .name { font-size: 3vh; font-weight: bold; margin-bottom: 0.5vh; }
.podium-card .team { font-size: 2vh; color: var(--dim); margin-bottom: 1vh; }
.podium-card .time { font-size: 2.5vh; font-family: 'Consolas', monospace; }

@keyframes reveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.hidden { display: none; }
</style>
</head>
<body onclick="goFullScreen()">
<div class="page-header">
    <span class="title" id="compName">游泳赛事管理系统</span>
    <div class="header-records">
        <span class="record-item"><span class="rec-label" id="recordMainLabel">WR</span><span id="recordWR">-</span></span>
        <span class="record-item"><span class="rec-label">CR</span><span id="recordCR">-</span></span>
    </div>
</div>

<div id="raceView" class="race-view">
    <div class="race-info">
        <div class="event-left">
            <span class="event-name" id="eventName">-</span>
            <span class="stage-heat" id="stageHeat">-</span>
        </div>
        <div class="running-time" id="runningTime">0.0</div>
    </div>
    <div class="lanes-header">
        <div style="width:5vw;text-align:center;margin-right:1vw;">道次</div>
        <div style="width:14vw;text-align:center;margin-right:1.5vw;">姓名</div>
        <div style="width:12vw;text-align:center;margin-right:1.5vw;">代表队</div>
        <div style="width:14vw;text-align:center;margin-right:1.5vw;">成绩</div>
        <div style="width:5vw;text-align:center;margin-right:1vw;">名次</div>
        <div style="width:8vw;text-align:center;">备注</div>
    </div>
    <div class="lanes-container" id="lanesContainer"></div>
</div>

<div id="listView" class="list-container hidden"></div>
<div id="welcomeView" class="center-msg hidden">
    <div class="hero-text" id="welcomeTitle">欢迎</div>
    <div class="sub-text" id="welcomeSub"></div>
</div>
<div id="awardView" class="hidden">
    <div class="page-header"><span class="title" id="awardTitle">颁奖典礼</span></div>
    <div class="award-container" id="awardContainer"></div>
</div>

<!-- 媒体（图片 / 视频）全屏显示层 -->
<div id="mediaView" class="hidden" style="position:fixed;left:0;top:0;width:100vw;height:100vh;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;">
    <img id="mediaImg" style="display:none;max-width:100vw;max-height:100vh;"/>
    <video id="mediaVideo" style="display:none;max-width:100vw;max-height:100vh;background:#000;" playsinline></video>
</div>

<!-- 连接服务器遮罩：启动即显示，连接成功才消隐 -->
<div id="connectOverlay" style="position:fixed;left:0;top:0;width:100vw;height:100vh;background:#0f172aF2;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#f8fafc;font-family:'Microsoft YaHei',sans-serif;">
    <div style="background:#1e293b;border-radius:12px;padding:5vh 6vw;min-width:420px;box-shadow:0 8px 30px rgba(0,0,0,.4);">
        <div style="font-size:3vh;font-weight:bold;text-align:center;margin-bottom:2vh;">连接主服务器</div>
        <div style="font-size:1.8vh;color:#94a3b8;margin-bottom:0.6vh;">服务器 IP 地址</div>
        <input id="connHostInput" type="text" placeholder="如 192.168.1.100" autocomplete="off"
               style="width:100%;padding:1.2vh 1vw;border:1px solid #334155;border-radius:6px;background:#0f172a;color:#f8fafc;font-size:2.2vh;outline:none;"/>
        <div style="display:flex;gap:1vw;margin-top:2.5vh;">
            <button id="connBtn" onclick="overlayConnect()"
                    style="flex:1;padding:1.4vh 2vw;background:#22c55e;color:white;border:none;border-radius:6px;font-size:2vh;font-weight:bold;cursor:pointer;">连接</button>
        </div>
        <div id="connStatus" style="margin-top:2vh;text-align:center;font-size:1.8vh;color:#f59e0b;min-height:2.5vh;">请输入主服务器IP并点击连接</div>
    </div>
</div>

<script>
window.onbeforeunload = function(e) { e.preventDefault(); e.returnValue = ''; return '确定要关闭大屏幕显示？'; };

function goFullScreen() {
    var el = document.documentElement;
    if (document.fullscreenElement) return; // 已全屏
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
}

var ws, data = {}, reconnectTimer;
var currentMode = 'SHOW_LIVE_RACE';
var publishedData = null;
var modeLocked = false;  // 成绩发布时锁定模式，不被广播覆盖
// 第1名分段成绩显示
var _dspFirstDetected = 0;
var _dspFirstTime = '';
var _dspFirstShowStart = 0;
var _dspFirstHoldSec = 3;
// 本地计时器（独立于服务器广播，保证滚动时间不间断）
var _dspTimerStart = 0;
var _dspTimerSynced = false;
// 每道的显示状态跟踪：{lane: {splitCount, reactionShown, showTime}}
var laneDisplayState = {};
var refreshTimer = null;

var _connFailCount = 0;

// 启动总是先显示遮罩（即便 localStorage 有上次保存的IP，也以遮罩形式展示并让用户决定是否调整）
// 例外：URL 带 ?host=xxx 直连；或页面 hostname 不是 localhost 时直连
function getInitialHost() {
    var params = new URLSearchParams(window.location.search);
    if (params.get('host')) return params.get('host');
    if (location.hostname && location.hostname !== '' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return location.hostname;
    return localStorage.getItem('swimServerHost') || '192.168.1.100';
}

function showConnectOverlay(statusText, statusColor) {
    var ov = document.getElementById('connectOverlay');
    if (ov) ov.style.display = 'flex';
    var st = document.getElementById('connStatus');
    if (st) {
        st.textContent = statusText || '请输入主服务器IP并点击连接';
        st.style.color = statusColor || '#f59e0b';
    }
}
function hideConnectOverlay() {
    var ov = document.getElementById('connectOverlay');
    if (ov) ov.style.display = 'none';
}

function overlayConnect() {
    var inp = document.getElementById('connHostInput');
    var ip = inp ? inp.value.trim() : '';
    if (!ip) { showConnectOverlay('请输入服务器IP', '#ef4444'); return; }
    localStorage.setItem('swimServerHost', ip);
    _connFailCount = 0;
    if (ws) try { ws.close(); } catch(e) {}
    showConnectOverlay('连接中… ' + ip + ':3002', '#f59e0b');
    connect();
}

// 兼容旧版：如果某些场景仍以 prompt() 方式询问 IP（如 URL 直连后又断开等），这里仍可调用
function getServerHost(forceAsk) {
    var params = new URLSearchParams(window.location.search);
    if (params.get('host')) return params.get('host');
    if (!forceAsk && location.hostname && location.hostname !== '' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return location.hostname;
    var saved = localStorage.getItem('swimServerHost');
    if (!forceAsk && saved) return saved;
    var def = saved || '192.168.1.100';
    var ip = prompt('请输入服务器IP地址:', def);
    if (ip) { localStorage.setItem('swimServerHost', ip); return ip; }
    return saved || 'localhost';
}

function changeServerHost() {
    // 优先使用遮罩内输入；若被外部代码调用，也保留 prompt 兜底询问一次
    showConnectOverlay('请重新输入服务器IP并点击连接', '#f59e0b');
    _connFailCount = 0;
    var inp = document.getElementById('connHostInput');
    if (!inp || !document.getElementById('connectOverlay')) {
        var h = getServerHost(true);
        if (ws) try { ws.close(); } catch(e) {}
        connect();
    }
}

function connect() {
    var host = getServerHost();
    document.title = '大屏幕 - ' + host;
    try { ws = new WebSocket('ws://' + host + ':3002'); }
    catch (ex) { showConnectOverlay('连接失败：' + ex.message, '#ef4444'); return; }
    ws.onopen = function() {
        _connFailCount = 0;
        ws.send(JSON.stringify({type: 'DISPLAY_IDENTITY'}));
        hideConnectOverlay();   // 只有连接成功才隐藏遮罩
    };
    // 用 requestAnimationFrame 合并消息：服务器密集广播时（每个触板/盲表都广播一次），
    // 手机若每条都解析+渲染一次会严重积压（手机 JS 引擎慢，几十 KB JSON.parse 5–20ms）。
    // 这里只保留"最新一份 SHOW_LIVE_RACE 数据"，下一帧统一渲染——10 条消息瞬间到达，
    // 也只渲染 1 次最新状态，队列瞬间排空，"计时复位"等关键事件能立刻反映到大屏。
    var _pendingMode = null;
    var _pendingData = null;
    var _renderScheduled = false;
    function _scheduleRender(mode, payload) {
        _pendingMode = mode;
        _pendingData = payload || {};
        if (_renderScheduled) return;
        _renderScheduled = true;
        var doIt = function() {
            _renderScheduled = false;
            if (_pendingMode) {
                modeLocked = false;
                currentMode = _pendingMode;
                data = _pendingData;
                _pendingMode = null;
                _pendingData = null;
                try { render(); } catch (e) {}
                startRefreshTimer();
            }
        };
        if (window.requestAnimationFrame) requestAnimationFrame(doIt);
        else setTimeout(doIt, 16);
    }

    ws.onmessage = function(e) {
        var msg;
        try { msg = JSON.parse(e.data); } catch (er) { return; }
        if (msg.type === 'SHOW_PUBLISHED_RESULT') {
            currentMode = 'SHOW_PUBLISHED_RESULT';
            publishedData = msg.data;
            modeLocked = true;
            renderPublishedResult(msg.data);
            return;
        }
        if (msg.type === 'SHOW_MEDIA') {
            currentMode = 'SHOW_MEDIA';
            modeLocked = true;
            renderMedia(msg.data || {});
            return;
        }
        if (modeLocked && msg.type === 'SHOW_LIVE_RACE') {
            // 锁定时仍更新 data 以备解锁后立即拿到最新状态
            data = msg.data || {};
            return;
        }
        // 其它消息走帧合并
        _scheduleRender(msg.type, msg.data);
    };
    ws.onclose = function() {
        stopRefreshTimer();
        _connFailCount++;
        // 连接断开 → 显示遮罩，让操作员看到状态/可改IP
        showConnectOverlay('未连接 / 连接断开（已尝试 ' + _connFailCount + ' 次），3 秒后自动重连…', '#ef4444');
        // 与旧版兼容：每 3 次失败后再用 confirm() 兜底询问一次（操作员若不便看遮罩仍能改地址）
        if (_connFailCount >= 3) {
            _connFailCount = 0;
            var retry = confirm('连接服务器失败，是否重新设置服务器地址？');
            if (retry) { changeServerHost(); return; }
        }
        setTimeout(connect, 3000);
    };
    ws.onerror = function() {
        showConnectOverlay('连接错误，请检查服务器IP是否正确', '#ef4444');
    };
}

// 高频但廉价的滚动时间 ticker（每 100ms 一次，只更新右上角 #runningTime 元素）
// 替代之前 500ms 全屏 render 导致的卡顿：
//   1) 滚动时间走时由本地计时器插值，不依赖网络刷新
//   2) 其它内容（运动员/分段/名次/备注）只在收到新广播时更新且只改有变化的字段
var _runningTimeTicker = null;
function startRunningTimeTicker() {
    if (_runningTimeTicker) return;
    _runningTimeTicker = setInterval(function() {
        if (currentMode !== 'SHOW_LIVE_RACE') return;
        var st = (data.raceState||'').toLowerCase();
        if (st !== 'racing' && st !== 'finished') return;
        try { _updateRunningTimeOnly(); } catch (e) {}
    }, 100);
}
function stopRunningTimeTicker() {
    if (_runningTimeTicker) { clearInterval(_runningTimeTicker); _runningTimeTicker = null; }
}

// 较低频的"显示窗口超时"刷新（每 250ms 走一次廉价的 _refreshRaceRows
// 让到时间的分段成绩自动消隐；不会重建 DOM，开销极小）
function startRefreshTimer() {
    if (refreshTimer) return;
    refreshTimer = setInterval(function() {
        if (currentMode !== 'SHOW_LIVE_RACE') return;
        var st = (data.raceState||'').toLowerCase();
        if (st !== 'racing' && st !== 'finished') return;
        try { _refreshRaceRows(); } catch (e) {}
    }, 250);
    startRunningTimeTicker();
}

function stopRefreshTimer() {
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    stopRunningTimeTicker();
}

function render() {
    document.getElementById('compName').textContent = data.competitionName || '游泳赛事管理系统';

    // 隐藏所有视图，清除翻页定时器
    if (_rankingPageTimer) { clearInterval(_rankingPageTimer); _rankingPageTimer = null; }
    document.getElementById('raceView').classList.add('hidden');
    document.getElementById('listView').classList.add('hidden');
    document.getElementById('welcomeView').classList.add('hidden');
    document.getElementById('awardView').classList.add('hidden');
    hideMediaView();

    // 成绩确认后自动切换到本组成绩排名
    if (data.resultConfirmed && currentMode === 'SHOW_LIVE_RACE') {
        renderHeatResult();
        return;
    }

    switch(currentMode) {
        case 'SHOW_LIVE_RACE': renderRace(); break;
        case 'SHOW_START_LIST': renderStartList(); break;
        case 'SHOW_HEAT_RESULT': renderHeatResult(); break;
        case 'SHOW_PUBLISHED_RESULT': if (publishedData) renderPublishedResult(publishedData); break;
        case 'SHOW_EVENT_RANKING': renderEventRanking(); break;
        case 'SHOW_TEAM_STANDINGS': renderTeamStandings(); break;
        case 'SHOW_AWARDS': renderAwards(); break;
        case 'SHOW_RECORDS': renderRecords(); break;
        case 'SHOW_WELCOME': case 'SHOW_PAUSE':
            renderWelcome(); break;
        default: renderRace();
    }
}

// 媒体（图片/视频）显示控制
function hideMediaView() {
    var mv = document.getElementById('mediaView');
    if (!mv) return;
    mv.classList.add('hidden');
    mv.style.display = 'none';
    var v = document.getElementById('mediaVideo');
    if (v) { try { v.pause(); } catch(e) {} v.removeAttribute('src'); v.load && v.load(); v.style.display = 'none'; }
    var img = document.getElementById('mediaImg');
    if (img) { img.removeAttribute('src'); img.style.display = 'none'; }
}
function renderMedia(d) {
    // 隐藏其他视图，确保媒体在最前
    if (_rankingPageTimer) { clearInterval(_rankingPageTimer); _rankingPageTimer = null; }
    document.getElementById('raceView').classList.add('hidden');
    document.getElementById('listView').classList.add('hidden');
    document.getElementById('welcomeView').classList.add('hidden');
    document.getElementById('awardView').classList.add('hidden');
    var mv = document.getElementById('mediaView');
    var img = document.getElementById('mediaImg');
    var vid = document.getElementById('mediaVideo');
    if (!mv || !img || !vid) return;
    mv.classList.remove('hidden');
    mv.style.display = 'flex';
    var fit = d.fit || 'contain';
    var fitCss = (fit === 'cover') ? 'cover' : (fit === 'fill' ? 'fill' : 'contain');
    if (d.kind === 'image') {
        try { vid.pause(); } catch(e) {}
        vid.removeAttribute('src'); vid.load && vid.load(); vid.style.display = 'none';
        img.style.display = '';
        img.style.objectFit = fitCss;
        img.style.width = '100vw';
        img.style.height = '100vh';
        img.src = d.dataUrl || '';
    } else if (d.kind === 'video') {
        img.removeAttribute('src'); img.style.display = 'none';
        vid.style.display = '';
        vid.style.objectFit = fitCss;
        vid.style.width = '100vw';
        vid.style.height = '100vh';
        vid.loop = !!d.loop;
        vid.muted = !!d.muted;
        vid.controls = false;
        vid.src = d.dataUrl || '';
        if (d.autoplay !== false) {
            try { vid.play(); } catch(e) {}
        }
    }
}

function isRelayEvent() { return (data.currentEvent||'').indexOf('接力') >= 0; }

function getLaneCount() {
    return (data.poolConfig && data.poolConfig.lanes) ? data.poolConfig.lanes : 10;
}

// ─── 比赛视图分区刷新机制 ─────────────────────────────────────
// 把"比赛实时画面"分成 4 类，按各自变化频率独立更新：
//   1) 顶部静态：赛事名 / 项目 / 阶段·组 / 纪录条 — 数据变化时才更新文字
//   2) 滚动时间右上角 — 100ms 本地插值，独立 ticker（_runningTimeTicker）
//   3) 泳道行 DOM —— 仅在 buildKey 变（项目/组/泳道布局）时重建一次；
//      运动员数据更新时按字段对比、最小化 textContent / className 写入
//   4) 显示窗口超时消隐 —— 250ms 廉价刷新（只走 _refreshRaceRows，无 DOM 重建）
var _raceRowsBuiltKey = '';
var _raceRowDOM = [];   // [{lane, row, laneNum, nameEl, teamEl, resultEl, rankEl, remarkEl, lastClass, lastResult, lastResultColor, lastRank, lastRankClass, lastRemark, lastRemarkColor, lastNameHtml, lastTeamHtml, lastLaneNum}]
var _raceHeaderRelay = null;

function renderRace() {
    document.getElementById('raceView').classList.remove('hidden');

    // ── 1) 顶部静态文字（仅变化才写入） ──
    var titleText = ((data.currentAgeGroup||'') ? (data.currentAgeGroup+' ') : '') + (data.currentGender||'') + '子 ' + (data.currentEvent||'');
    var stageText = (data.currentStage||'') + ' 第' + (data.currentHeat||0) + '/' + (data.totalHeats||0) + '组';
    var en = document.getElementById('eventName');
    if (en && en.textContent !== titleText) en.textContent = titleText;
    var sh = document.getElementById('stageHeat');
    if (sh && sh.textContent !== stageText) sh.textContent = stageText;

    // ── 本地计时器同步 / 显示窗口参数 ──
    var rState = (data.raceState||'').toLowerCase();
    if (rState === 'waiting' || rState === 'ready') {
        _dspTimerStart = 0; _dspTimerSynced = false;
        _dspFirstDetected = 0; _dspFirstShowStart = 0; _dspFirstTime = '';
    }
    if ((rState === 'racing' || rState === 'finished') && !_dspTimerSynced && data.runningTime) {
        var svrSec = 0, rp = data.runningTime.split(':');
        if (rp.length === 3) svrSec = parseFloat(rp[0])*3600 + parseFloat(rp[1])*60 + parseFloat(rp[2]);
        else if (rp.length === 2) svrSec = parseFloat(rp[0])*60 + parseFloat(rp[1]);
        else svrSec = parseFloat(rp[0]) || 0;
        _dspTimerStart = Date.now() - svrSec * 1000;
        _dspTimerSynced = true;
    }
    _dspFirstHoldSec = (data.laneCloseSettings && data.laneCloseSettings.splitDisplayTime) ? data.laneCloseSettings.splitDisplayTime : 3;

    // ── 计算 leader 与第1名成绩（仅在真实分段计数变化时更新）──
    var dspSwimmers = data.swimmers || [];
    var dspLeader = null, dspLeaderSc = 0, dspLeaderLast = '';
    for (var di = 0; di < dspSwimmers.length; di++) {
        var ds = dspSwimmers[di];
        if (ds.status) continue;
        var rsi = _realSplitInfoOf(ds);
        var dsc = rsi.count;
        if (ds.isFinished && ds.finalTime) dsc = 9999;
        if (dsc > dspLeaderSc || (dsc === dspLeaderSc && dspLeader && ds.rank > 0 && ds.rank < (dspLeader.rank||99))) {
            dspLeaderSc = dsc;
            dspLeader = ds;
            dspLeaderLast = ds.isFinished && ds.finalTime ? ds.finalTime : rsi.last;
        }
    }
    if (dspLeader) {
        var dlsc = dspLeaderSc;
        if (dlsc !== _dspFirstDetected) {
            _dspFirstDetected = dlsc;
            if (dspLeader.isFinished && dspLeader.finalTime) {
                _dspFirstTime = dspLeader.finalTime;
            } else if (dspLeaderLast) {
                _dspFirstTime = dspLeaderLast;
            }
            if (_dspFirstTime) _dspFirstShowStart = Date.now();
        }
    }

    // ── 滚动时间（首次/状态切换写一次；100ms ticker 持续更新） ──
    _updateRunningTimeOnly();

    // ── 纪录条（变化才写） ──
    var mainLabel = data.displayRecordLabel || 'WR';
    var mainTypeName = data.displayRecordTypeName || '世界纪录';
    var wrText = '-', crText = '-';
    var records = data.records || [];
    var curGender = data.currentGender || '';
    var curEventName = data.currentEvent || '';
    for (var r = 0; r < records.length; r++) {
        var rec = records[r];
        if (rec.gender === curGender && rec.eventName === curEventName) {
            var rt = rec.recordType || '';
            if (rt === mainTypeName || rt.indexOf(mainTypeName) >= 0) wrText = rec.time || '-';
            else if (rt === '赛会纪录') crText = rec.time || '-';
        }
    }
    var labelEl = document.getElementById('recordMainLabel');
    if (labelEl && labelEl.textContent !== mainLabel) labelEl.textContent = mainLabel;
    var wrEl = document.getElementById('recordWR'); if (wrEl && wrEl.textContent !== wrText) wrEl.textContent = wrText;
    var crEl = document.getElementById('recordCR'); if (crEl && crEl.textContent !== crText) crEl.textContent = crText;

    // ── 等待状态：清空显示状态 ──
    if (rState === 'waiting') {
        laneDisplayState = {};
    }

    // ── 3) 泳道行 DOM 缓存 / 重建 ──
    _ensureRaceRowsDom();
    // ── 4) 字段刷新（仅按需更新文字/类名，不重建 DOM）──
    _refreshRaceRows();
}

// 抽出来给 100ms ticker 复用：仅写右上角 #runningTime 文本/颜色
function _updateRunningTimeOnly() {
    var runEl = document.getElementById('runningTime');
    if (!runEl) return;
    // 计时控制端确认本组成绩后，大屏切换到本组成绩榜，滚动时间不再显示
    // （否则 100ms ticker 会把 renderHeatResult 设的空文本反复覆盖回去）
    if (data && data.resultConfirmed) {
        if (runEl.textContent !== '') runEl.textContent = '';
        if (runEl.style.color !== '') runEl.style.color = '';
        return;
    }
    var localRunTime = data.runningTime || '0.0';
    if (_dspTimerStart > 0) {
        var elapsed = (Date.now() - _dspTimerStart) / 1000;
        var ts = Math.floor(elapsed) % 60, tm = Math.floor(elapsed / 60) % 60, th = Math.floor(elapsed / 3600);
        var tt = Math.floor(elapsed * 10) % 10;
        if (th > 0) localRunTime = th + ':' + tm.toString().padStart(2,'0') + ':' + ts.toString().padStart(2,'0') + '.' + tt;
        else if (tm > 0) localRunTime = tm + ':' + ts.toString().padStart(2,'0') + '.' + tt;
        else localRunTime = ts + '.' + tt;
    }
    var dspHoldMs = _dspFirstHoldSec * 1000;
    var showLeader = (_dspFirstShowStart > 0 && (Date.now() - _dspFirstShowStart) < dspHoldMs && _dspFirstTime);
    var newText = showLeader ? _dspFirstTime : localRunTime;
    var newColor = showLeader ? '#22c55e' : '';
    if (runEl.textContent !== newText) runEl.textContent = newText;
    if (runEl.style.color !== newColor) runEl.style.color = newColor;
}

// 计算单运动员"已有真实时间"的分段计数 + 最新累计
function _realSplitInfoOf(ds) {
    var c = 0, last = '';
    if (ds && ds.splits) {
        for (var i = 0; i < ds.splits.length; i++) {
            var sp = ds.splits[i];
            var cum = sp && (sp.cumulative || sp.time) ? (sp.cumulative || sp.time) : '';
            if (cum) { c++; last = cum; }
        }
    }
    return { count: c, last: last };
}

// 接力项目：根据当前圈数推算正在游的棒次，返回 "第N棒: 队员姓名"
// 与 race_control.html / 主控 ComputeRelayCurrentLegLabel 同算法
function getRelayCurrentLegName(sw) {
    var names = (sw.name||'').split(',');
    if (names.length <= 1) return (sw.name || '').trim();
    var currentLap = sw.currentLap || 0;
    var ev = data.currentEvent || '';
    var m = ev.match(/(\d+)\s*[x×]\s*(\d+)/);
    var legCount = m ? parseInt(m[1]) : 4;
    var legDist = m ? parseInt(m[2]) : 100;
    var poolLen = (data.poolConfig && data.poolConfig.length) ? data.poolConfig.length : 50;
    var lapsPerLeg = Math.max(1, Math.floor(legDist / poolLen));
    var currentLeg = Math.floor(currentLap / lapsPerLeg);  // 0-based
    if (currentLeg >= legCount) currentLeg = legCount - 1;
    if (currentLeg < 0) currentLeg = 0;
    if (sw.isFinished) currentLeg = legCount - 1;
    var legName = (currentLeg < names.length) ? names[currentLeg].trim() : names[0].trim();
    return '第' + (currentLeg + 1) + '棒: ' + legName;
}

// 过滤掉"空泳道占位"——大屏上不显示无运动员的泳道，让画面更简洁
// 后端会为空道送 { status: 'EMPTY', name: '', ... }，这里直接剔除
function _activeSwimmersForDisplay() {
    var arr = data.swimmers || [];
    var out = [];
    for (var i = 0; i < arr.length; i++) {
        var s = arr[i];
        if (!s) continue;
        if (s.status === 'EMPTY') continue;             // 后端显式空道占位
        var hasName = (s.name && String(s.name).trim() !== '');
        var hasBib  = (s.bibNumber && String(s.bibNumber).trim() !== '');
        if (!hasName && !hasBib) continue;              // 无姓名+无号码：视为空道
        out.push(s);
    }
    return out;
}

// DOM 构建：仅在 buildKey 变化时执行（运动员名单/泳道布局/接力切换/泳道数）
function _ensureRaceRowsDom() {
    var lc = getLaneCount();
    var fs = lc <= 8 ? '3.5vh' : '2.9vh';
    var relay = isRelayEvent();
    var swimmers = _activeSwimmersForDisplay();
    var keyParts = [data.currentEvent||'', data.currentHeat||0, lc, relay?1:0, swimmers.length];
    for (var k = 0; k < swimmers.length; k++) {
        keyParts.push((swimmers[k].lane != null ? swimmers[k].lane : -1) + ':' + (swimmers[k].name||''));
    }
    var key = keyParts.join('|');
    if (key === _raceRowsBuiltKey) return;

    // 表头
    var hdr1 = relay ? '代表队' : '姓名';
    var hdr2 = relay ? '姓名' : '代表队';
    var header = document.querySelector('.lanes-header');
    if (header) {
        header.innerHTML =
            '<div style="width:5vw;text-align:center;margin-right:1vw;font-size:'+fs+';">道次</div>' +
            '<div style="width:14vw;text-align:center;margin-right:1.5vw;font-size:'+fs+';">' + hdr1 + '</div>' +
            '<div style="width:12vw;text-align:center;margin-right:1.5vw;font-size:'+fs+';">' + hdr2 + '</div>' +
            '<div style="width:14vw;text-align:center;margin-right:1.5vw;font-size:'+fs+';">成绩</div>' +
            '<div style="width:5vw;text-align:center;margin-right:1vw;font-size:'+fs+';">名次</div>' +
            '<div style="width:8vw;text-align:center;">备注</div>';
    }

    var container = document.getElementById('lanesContainer');
    if (!container) return;
    container.innerHTML = '';
    _raceRowDOM = [];
    _raceHeaderRelay = relay;

    for (var i = 0; i < swimmers.length; i++) {
        var sw = swimmers[i];
        var row = document.createElement('div');
        row.className = 'lane-row';
        // 子节点采用与原模板一致的 class，便于现有 CSS 继续生效
        row.innerHTML =
            '<div class="lane-num"></div>' +
            '<div class="swimmer-name"></div>' +
            '<div class="swimmer-team"></div>' +
            '<div class="result-time"></div>' +
            '<div class="rank"></div>' +
            '<div class="remark"></div>';
        container.appendChild(row);
        _raceRowDOM.push({
            lane: sw.lane,
            row: row,
            laneNum: row.children[0],
            nameEl: row.children[1],
            teamEl: row.children[2],
            resultEl: row.children[3],
            rankEl: row.children[4],
            remarkEl: row.children[5],
            lastClass: '', lastResult: null, lastResultColor: '', lastRank: null, lastRankClass: '',
            lastRemark: null, lastRemarkColor: '',
            lastNameHtml: null, lastTeamHtml: null,
            lastLaneNum: null
        });
    }
    _raceRowsBuiltKey = key;
}

// 字段刷新：只写真正变化的字段（textContent / className / innerHTML）
function _refreshRaceRows() {
    var swimmers = _activeSwimmersForDisplay();
    var relay = !!_raceHeaderRelay;
    var now = Date.now();
    var displayTime = (data.laneCloseSettings ? data.laneCloseSettings.splitDisplayTime : 5) || 5;
    var displayMs = displayTime * 1000;

    // 分段名次：直接使用服务器广播的 sw.rank，与三个计时控制端完全同源
    // （服务器在 ComputeLiveRanks 中按"已完赛优先 → 有效分段数倒序 → 累计时间升序"统一计算 +
    //   并列名次 1-2-2-4，已涵盖接力的真实进度）
    var splitRanks = {};
    for (var i = 0; i < swimmers.length; i++) {
        var s = swimmers[i];
        if (s && s.lane != null && s.rank > 0) splitRanks[s.lane] = s.rank;
    }

    for (var i3 = 0; i3 < swimmers.length && i3 < _raceRowDOM.length; i3++) {
        var sw = swimmers[i3];
        var ui = _raceRowDOM[i3];
        if (!ui) continue;
        var lane = sw.lane;

        if (!laneDisplayState[lane]) laneDisplayState[lane] = {splitCount: 0, showTime: 0, lastReactionSeq: -1, lastReactionStr: '', reactionShowAt: 0};
        var ls = laneDisplayState[lane];

        var rawSplitCount = (sw.splits ? sw.splits.length : 0);
        var rsi2 = _realSplitInfoOf(sw);
        var realSplitCount = rsi2.count;
        var lastRealSplitStr = rsi2.last;
        var hasReaction = sw.reactionTime && sw.reactionTime !== '';
        // 检测"新一棒反应时"，同时给两条触发路径以兼容新旧服务器：
        //   (1) 优先使用服务器送来的 reactionSeq（每次写 ReactionTime 自增）
        //   (2) 老服务器无 reactionSeq 字段时，退回比较 reactionTime 字符串
        if (hasReaction) {
            var seq = (typeof sw.reactionSeq === 'number') ? sw.reactionSeq : null;
            var trig = false;
            if (seq !== null) {
                if (seq !== ls.lastReactionSeq) { ls.lastReactionSeq = seq; trig = true; }
            } else {
                if (sw.reactionTime !== ls.lastReactionStr) trig = true;
            }
            if (sw.reactionTime !== ls.lastReactionStr) ls.lastReactionStr = sw.reactionTime;
            if (trig) ls.reactionShowAt = now;
        }
        if (realSplitCount > ls.splitCount) { ls.splitCount = realSplitCount; ls.showTime = now; }

        // 行类名
        var classes = 'lane-row';
        if (sw.isFinished) classes += ' finished';
        if (sw.status === 'DNS') classes += ' dns';
        if (sw.status === 'DSQ') classes += ' dsq';
        if (ui.lastClass !== classes) { ui.row.className = classes; ui.lastClass = classes; }

        // 道次
        var laneStr = (lane != null ? String(lane) : '');
        if (ui.lastLaneNum !== laneStr) { ui.laneNum.textContent = laneStr; ui.lastLaneNum = laneStr; }

        // 姓名 / 代表队列
        // 接力：左列=代表队，右列="第N棒: 队员姓名"（按当前圈数动态推算，跟随加减圈刷新）
        var teamDisplay = sw.countryShort || sw.country || '';
        var col1Html, col2Html;
        if (relay) {
            col1Html = teamDisplay;
            col2Html = getRelayCurrentLegName(sw);
        } else {
            col1Html = sw.name || '';
            col2Html = teamDisplay;
        }
        if (ui.lastNameHtml !== col1Html) { ui.nameEl.innerHTML = col1Html; ui.lastNameHtml = col1Html; }
        if (ui.lastTeamHtml !== col2Html) { ui.teamEl.innerHTML = col2Html; ui.lastTeamHtml = col2Html; }

        // 成绩 / 名次
        var resultText = '', rankText = '', rankClass = '';
        if (sw.status === 'DNS' || sw.status === 'DNF' || sw.status === 'DSQ') {
            // DNS/DNF/DSQ 不显示成绩
        } else if (sw.isFinished && sw.finalTime) {
            resultText = sw.finalTime;
            if (sw.rank === 1) { rankClass = 'gold'; rankText = sw.rank; }
            else if (sw.rank === 2) { rankClass = 'silver'; rankText = sw.rank; }
            else if (sw.rank === 3) { rankClass = 'bronze'; rankText = sw.rank; }
            else if (sw.rank > 0) { rankText = sw.rank; }
        } else {
            var elapsed = now - ls.showTime;
            if (ls.showTime > 0 && elapsed < displayMs && realSplitCount > 0) {
                resultText = lastRealSplitStr;
                if (splitRanks[lane]) {
                    rankText = splitRanks[lane];
                    // 与终点态保持一致的奖牌色
                    if (rankText === 1) rankClass = 'gold';
                    else if (rankText === 2) rankClass = 'silver';
                    else if (rankText === 3) rankClass = 'bronze';
                }
            }
            // 反应时不再写入成绩栏 — 改到下方"备注栏"显示，时长与 splitDisplayTime 相同
        }
        if (ui.lastResult !== resultText) { ui.resultEl.textContent = resultText; ui.lastResult = resultText; }
        // 成绩栏不再承载反应时，统一不染色
        if (ui.lastResultColor !== '') { ui.resultEl.style.color = ''; ui.lastResultColor = ''; }
        var rankStr = rankText !== '' ? String(rankText) : '';
        if (ui.lastRank !== rankStr) { ui.rankEl.textContent = rankStr; ui.lastRank = rankStr; }
        var rankClsFull = 'rank' + (rankClass ? ' ' + rankClass : '');
        if (ui.lastRankClass !== rankClsFull) { ui.rankEl.className = rankClsFull; ui.lastRankClass = rankClsFull; }

        // 备注栏（优先级，从高到低）：
        //   1) 判罚 DSQ/DNS/DNF/DQ — 红色（裁判一标注就实时显示，不等待成绩确认）
        //   2) 破/平纪录 recordNote — 金色
        //   3) 反应时显示窗口（最近一次 reactionSeq 触发后的 splitDisplayTime 秒内）— 抢跳可疑标红，否则正常色
        // 前两类不会被反应时覆盖，符合"犯规等信息持续显示"的要求。
        var remarkText = '', remarkColor = '';
        if (sw.status === 'DSQ' || sw.status === 'DQ') { remarkText = 'DSQ'; remarkColor = ''; }     // 默认红（CSS .remark）
        else if (sw.status === 'DNS') { remarkText = 'DNS'; remarkColor = ''; }
        else if (sw.status === 'DNF') { remarkText = 'DNF'; remarkColor = ''; }
        if (!remarkText && sw.recordNote) { remarkText = sw.recordNote; remarkColor = '#fbbf24'; }
        if (!remarkText && hasReaction && ls.reactionShowAt > 0 && (now - ls.reactionShowAt) < displayMs) {
            remarkText = sw.reactionTime;
            remarkColor = (sw.isSuspectFalseStart || sw.isFalseStart) ? '#ef4444' : '#f8fafc';
        }
        if (ui.lastRemark !== remarkText) { ui.remarkEl.textContent = remarkText; ui.lastRemark = remarkText; }
        if (ui.lastRemarkColor !== remarkColor) { ui.remarkEl.style.color = remarkColor; ui.lastRemarkColor = remarkColor; }
    }
}

function renderStartList() {
    document.getElementById('listView').classList.remove('hidden');
    var lv = document.getElementById('listView');
    var html = '<h2 style="margin-bottom:2vh;font-size:3vh;">' + ((data.currentAgeGroup||'') ? (data.currentAgeGroup+' ') : '') + (data.currentGender||'') + '子 ' + (data.currentEvent||'') + ' ' + (data.currentStage||'') + ' 第' + (data.currentHeat||'') + '组 出发表</h2>';
    var slRelay = isRelayEvent();
    var slH1 = slRelay ? '代表队' : '姓名';
    var slH2 = slRelay ? '姓名' : '代表队';
    html += '<table class="list-table"><thead><tr><th>道</th><th>号码</th><th>' + slH1 + '</th><th>' + slH2 + '</th></tr></thead><tbody>';
    var sw = data.swimmers || [];

function renderHeatResult() {
    // 使用和比赛视图相同的布局和字体
    document.getElementById('raceView').classList.remove('hidden');
    document.getElementById('eventName').textContent = ((data.currentAgeGroup||'') ? (data.currentAgeGroup+' ') : '') + (data.currentGender||'') + ' ' + (data.currentEvent||'');
    document.getElementById('stageHeat').textContent = (data.currentStage||'') + ' 第' + (data.currentHeat||0) + '组 成绩';
    document.getElementById('runningTime').textContent = '';

    // 成绩排名表头（接力：代表队在前）
    var relay = isRelayEvent();
    var hdr1 = relay ? '代表队' : '姓名';
    var hdr2 = relay ? '姓名' : '代表队';
    // 接力赛 col2 为 4 个队员姓名（逗号分隔）— 加宽到 36vw 并允许换行；对应 col1（代表队）压到 8vw
    var c1Width = relay ? '8vw' : '14vw';
    var c2Width = relay ? '36vw' : '12vw';
    // 接力姓名列覆盖 .swimmer-team 默认的 nowrap+overflow:hidden，让 4 名队员名超宽时自动换行
    var c2WrapStyle = relay ? 'white-space:normal;overflow:visible;line-height:1.3;' : '';
    var header = document.querySelector('.lanes-header');
    if (header) {
        header.innerHTML =
            '<div style="width:5vw;text-align:center;margin-right:1vw;">名次</div>' +
            '<div style="width:' + c1Width + ';text-align:center;margin-right:1.5vw;">' + hdr1 + '</div>' +
            '<div style="width:' + c2Width + ';text-align:center;margin-right:1.5vw;">' + hdr2 + '</div>' +
            '<div style="width:5vw;text-align:center;margin-right:1vw;">道次</div>' +
            '<div style="width:14vw;text-align:center;margin-right:1.5vw;">成绩</div>' +
            '<div style="width:8vw;text-align:center;">备注</div>';
    }

    // 仅保留有运动员的泳道（空泳道占位条目不进成绩榜）
    var sw = (data.swimmers || []).filter(isOccupiedLane).slice().sort(function(a,b) { return (a.rank||99) - (b.rank||99); });
    var container = document.getElementById('lanesContainer');
    container.innerHTML = '';

    for (var i = 0; i < sw.length; i++) {
        var s = sw[i];
        var row = document.createElement('div');
        row.className = 'lane-row finished';

        var rankText = '', rankClass = '';
        if (s.rank === 1) { rankClass = 'gold'; rankText = '1'; }
        else if (s.rank === 2) { rankClass = 'silver'; rankText = '2'; }
        else if (s.rank === 3) { rankClass = 'bronze'; rankText = '3'; }
        else if (s.rank > 0) { rankText = s.rank; }

        // 备注栏优先级（确认成绩后的本组成绩榜）：DSQ/DNS/DNF（红）> 破/平纪录 recordNote（金）
        var remarkText = '', remarkColor = '';
        if (s.status === 'DSQ') remarkText = 'DSQ';
        else if (s.status === 'DNS') remarkText = 'DNS';
        else if (s.status === 'DNF') remarkText = 'DNF';
        if (!remarkText && s.recordNote) { remarkText = s.recordNote; remarkColor = '#fbbf24'; }
        var resultText = (s.status === 'DSQ' || s.status === 'DNS' || s.status === 'DNF') ? '' : (s.finalTime || '');

        var c1 = relay ? (s.country||'') : (s.name||'');
        var c2 = relay ? (s.name||'') : (s.country||'');
        var remarkStyle = remarkColor ? (' style="color:' + remarkColor + ';"') : '';
        row.innerHTML =
            '<div class="rank ' + rankClass + '">' + rankText + '</div>' +
            '<div class="swimmer-name" style="width:' + c1Width + ';">' + c1 + '</div>' +
            '<div class="swimmer-team" style="width:' + c2Width + ';' + c2WrapStyle + '">' + c2 + '</div>' +
            '<div class="lane-num">' + s.lane + '</div>' +
            '<div class="result-time">' + resultText + '</div>' +
            '<div class="remark"' + remarkStyle + '>' + remarkText + '</div>';
        container.appendChild(row);
    }
}

// 判断该泳道占位记录是否真有运动员
// 空泳道占位记录由后端用 status === 'EMPTY' 显式标识，必须先排除
// （以前误把 status='EMPTY' 当作"非空状态"而保留 0 道空行）
function isOccupiedLane(s) {
    if (!s) return false;
    if (s.status === 'EMPTY') return false;     // 后端空泳道占位
    if (s.bibNumber) return true;
    if (s.name && s.name !== '') return true;
    if (s.country && s.country !== '') return true;
    if (s.finalTime && s.finalTime !== '') return true;
    if (s.status && s.status !== '') return true;
    return false;
}

function renderPublishedResult(pubData) {
    if (!pubData) return;

    // 隐藏所有视图，清除翻页定时器
    if (_rankingPageTimer) { clearInterval(_rankingPageTimer); _rankingPageTimer = null; }
    document.getElementById('raceView').classList.add('hidden');
    document.getElementById('listView').classList.add('hidden');
    document.getElementById('welcomeView').classList.add('hidden');
    document.getElementById('awardView').classList.add('hidden');
    hideMediaView();

    document.getElementById('compName').textContent = pubData.competitionName || '';
    document.getElementById('raceView').classList.remove('hidden');

    var eventTitle = (pubData.gender||'') + ' ' + (pubData.eventName||'');
    var stageTitle = (pubData.stage||'') + (pubData.heatDisplay||'') + ' 成绩';
    document.getElementById('eventName').textContent = eventTitle;
    document.getElementById('stageHeat').textContent = stageTitle;
    document.getElementById('runningTime').textContent = '';

    // 根据泳道数调整字体
    var laneCount = (pubData.poolConfig && pubData.poolConfig.lanes) ? pubData.poolConfig.lanes : 10;
    var fontSize = laneCount <= 8 ? 3.5 : 2.9;  // 8道用更大字体
    var laneNumSize = laneCount <= 8 ? 3.0 : 2.5;
    var rankSize = laneCount <= 8 ? 3.5 : 2.9;

    // 成绩排名表头（接力：代表队在前）
    var pubRelay = (pubData.eventName||'').indexOf('接力') >= 0;
    var ph1 = pubRelay ? '代表队' : '姓名';
    var ph2 = pubRelay ? '姓名' : '代表队';
    // 接力 col2 为 4 个队员姓名（逗号分隔）— 加宽到 36vw 并允许换行，对应 col1（代表队）压到 8vw
    var pc1Width = pubRelay ? '8vw' : '14vw';
    var pc2Width = pubRelay ? '36vw' : '12vw';
    var pc2WrapStyle = pubRelay ? 'white-space:normal;overflow:visible;line-height:1.3;' : '';
    var header = document.querySelector('.lanes-header');
    if (header) {
        header.innerHTML =
            '<div style="width:5vw;text-align:center;margin-right:1vw;font-size:' + fontSize + 'vh;">名次</div>' +
            '<div style="width:' + pc1Width + ';text-align:center;margin-right:1.5vw;font-size:' + fontSize + 'vh;">' + ph1 + '</div>' +
            '<div style="width:' + pc2Width + ';text-align:center;margin-right:1.5vw;font-size:' + fontSize + 'vh;">' + ph2 + '</div>' +
            '<div style="width:5vw;text-align:center;margin-right:1vw;font-size:' + fontSize + 'vh;">道次</div>' +
            '<div style="width:14vw;text-align:center;margin-right:1.5vw;font-size:' + fontSize + 'vh;">成绩</div>' +
            '<div style="width:8vw;text-align:center;font-size:' + fontSize + 'vh;">备注</div>';
    }

    // 同样过滤掉空泳道占位条目
    var sw = (pubData.swimmers || []).filter(isOccupiedLane).slice().sort(function(a,b) { return (a.rank||99) - (b.rank||99); });
    var container = document.getElementById('lanesContainer');
    container.innerHTML = '';

    for (var i = 0; i < sw.length; i++) {
        var s = sw[i];
        var row = document.createElement('div');
        row.className = 'lane-row finished';

        var rankText = '', rankClass = '';
        if (s.rank === 1) { rankClass = 'gold'; rankText = '1'; }
        else if (s.rank === 2) { rankClass = 'silver'; rankText = '2'; }
        else if (s.rank === 3) { rankClass = 'bronze'; rankText = '3'; }
        else if (s.rank > 0) { rankText = s.rank; }

        // 备注栏优先级（公布成绩）：DSQ/DNS/DNF（红）> 破/平纪录 recordNote（金）
        var remarkText = '', remarkColor = '';
        if (s.status === 'DSQ' || s.resultStatus === 'DSQ') remarkText = 'DSQ';
        else if (s.status === 'DNS') remarkText = 'DNS';
        else if (s.status === 'DNF') remarkText = 'DNF';
        if (!remarkText && s.recordNote) { remarkText = s.recordNote; remarkColor = '#fbbf24'; }
        var pubResultText = (s.status === 'DSQ' || s.status === 'DNS' || s.status === 'DNF' || s.resultStatus === 'DSQ') ? '' : (s.finalTime || '');

        var pc1 = pubRelay ? (s.country||'') : (s.name||'');
        var pc2 = pubRelay ? (s.name||'') : (s.country||'');
        var pubRemarkStyle = ' style="font-size:' + fontSize + 'vh;' + (remarkColor ? ('color:' + remarkColor + ';') : '') + '"';
        row.innerHTML =
            '<div class="rank ' + rankClass + '" style="font-size:' + rankSize + 'vh;">' + rankText + '</div>' +
            '<div class="swimmer-name" style="width:' + pc1Width + ';font-size:' + fontSize + 'vh;">' + pc1 + '</div>' +
            '<div class="swimmer-team" style="width:' + pc2Width + ';font-size:' + fontSize + 'vh;' + pc2WrapStyle + '">' + pc2 + '</div>' +
            '<div class="lane-num" style="font-size:' + laneNumSize + 'vh;">' + s.lane + '</div>' +
            '<div class="result-time" style="font-size:' + fontSize + 'vh;">' + pubResultText + '</div>' +
            '<div class="remark"' + pubRemarkStyle + '>' + remarkText + '</div>';
        container.appendChild(row);
    }
}

var _rankingPageTimer = null;
var _rankingCurrentPage = 0;
var _rankingTotalPages = 1;
var _rankingRowsPerPage = 10;
var _rankingPageInterval = 5000; // 默认5秒；以参数设置中"大屏翻屏时间"为准

// 取当前生效的翻屏时间（毫秒）；data.laneCloseSettings.bigDisplayPageInterval 单位是秒
function getBigDisplayPageIntervalMs() {
    var sec = 5;
    if (data && data.laneCloseSettings && typeof data.laneCloseSettings.bigDisplayPageInterval !== 'undefined') {
        var v = parseFloat(data.laneCloseSettings.bigDisplayPageInterval);
        if (!isNaN(v) && v > 0) sec = v;
    }
    return sec * 1000;
}

function renderEventRanking() {
    if (_rankingPageTimer) { clearInterval(_rankingPageTimer); _rankingPageTimer = null; }

    document.getElementById('listView').classList.remove('hidden');
    var er = data.eventRanking || [];
    var erRelay = isRelayEvent();

    _rankingRowsPerPage = 10;
    _rankingTotalPages = Math.max(1, Math.ceil(er.length / _rankingRowsPerPage));
    _rankingCurrentPage = 0;
    _rankingPageInterval = getBigDisplayPageIntervalMs();

    showRankingPage(er, erRelay);

    // 多页时启动自动翻页
    if (_rankingTotalPages > 1) {
        _rankingPageTimer = setInterval(function() {
            _rankingCurrentPage = (_rankingCurrentPage + 1) % _rankingTotalPages;
            showRankingPage(er, erRelay);
        }, _rankingPageInterval);
    }
}

function showRankingPage(er, erRelay) {
    var lv = document.getElementById('listView');
    var erH1 = erRelay ? '代表队' : '姓名';
    var erH2 = erRelay ? '姓名' : '代表队';

    var html = '<h2 style="margin-bottom:1.5vh;font-size:3vh;">' + ((data.currentAgeGroup||'') ? (data.currentAgeGroup+' ') : '') + (data.currentGender||'') + '子 ' + (data.currentEvent||'') + ' ' + (data.currentStage||'') + ' 总排名</h2>';
    html += '<table class="list-table"><thead><tr><th>名次</th><th>号码</th><th>' + erH1 + '</th><th>' + erH2 + '</th><th>成绩</th></tr></thead><tbody>';

    var start = _rankingCurrentPage * _rankingRowsPerPage;
    var end = Math.min(start + _rankingRowsPerPage, er.length);
    for (var i = start; i < end; i++) {
        var erc1 = erRelay ? (er[i].country||'') : (er[i].name||'');
        var erc2 = erRelay ? (er[i].name||'') : (er[i].country||'');
        var erkText = er[i].rank > 0 ? er[i].rank : '-';
        var erStatus = er[i].resultStatus || er[i].status || '';
        html += '<tr><td>' + erkText + '</td><td>' + (er[i].bibNumber||'') + '</td><td>' + erc1 + '</td><td>' + erc2 + '</td><td>' + (er[i].finalTime || erStatus || '') + '</td></tr>';
    }
    html += '</tbody></table>';

    if (_rankingTotalPages > 1) {
        html += '<div class="page-indicator">' + (_rankingCurrentPage + 1) + ' / ' + _rankingTotalPages + '</div>';
    }
    lv.innerHTML = html;
}

function renderTeamStandings() {
    document.getElementById('listView').classList.remove('hidden');
    var lv = document.getElementById('listView');
    var html = '<h2 style="margin-bottom:2vh;font-size:3vh;">团体积分排名</h2>';
    html += '<table class="list-table"><thead><tr><th>名次</th><th>代表队</th><th>总分</th><th>金</th><th>银</th><th>铜</th></tr></thead><tbody>';
    var ts = data.teamScores || [];
    for (var i = 0; i < ts.length; i++) {
        html += '<tr><td>' + ts[i].rank + '</td><td>' + ts[i].teamName + '</td><td>' + ts[i].totalPoints + '</td><td>' + ts[i].gold + '</td><td>' + ts[i].silver + '</td><td>' + ts[i].bronze + '</td></tr>';
    }
    html += '</tbody></table>';
    lv.innerHTML = html;
}

function renderRecords() {
    document.getElementById('listView').classList.remove('hidden');
    var lv = document.getElementById('listView');
    var html = '<h2 style="margin-bottom:2vh;font-size:3vh;">纪录榜</h2>';
    html += '<table class="list-table"><thead><tr><th>项目</th><th>类型</th><th>保持者</th><th>代表队</th><th>成绩</th><th>日期</th></tr></thead><tbody>';
    var rs = data.records || [];
    for (var i = 0; i < rs.length; i++) {
        html += '<tr><td>' + rs[i].eventName + '</td><td>' + rs[i].recordType + '</td><td>' + rs[i].holderName + '</td><td>' + rs[i].holderCountry + '</td><td>' + rs[i].time + '</td><td>' + rs[i].date + '</td></tr>';
    }
    html += '</tbody></table>';
    lv.innerHTML = html;
}

function renderAwards() {
    document.getElementById('awardView').classList.remove('hidden');
    document.getElementById('awardTitle').textContent = ((data.currentAgeGroup||'') ? (data.currentAgeGroup+' ') : '') + (data.currentGender||'') + '子 ' + (data.currentEvent||'') + ' 颁奖典礼';
    var container = document.getElementById('awardContainer');
    container.innerHTML = '';
    var er = data.eventRanking || [];
    var medals = ['silver','gold','bronze'];
    var icons = ['\uD83E\uDD48','\uD83E\uDD47','\uD83E\uDD49'];
    var order = [1,0,2]; // silver, gold, bronze display order
    for (var i = 0; i < 3 && i < er.length; i++) {
        var idx = order[i];
        if (idx >= er.length) continue;
        var card = document.createElement('div');
        card.className = 'podium-card ' + medals[i];
        var awRelay = isRelayEvent();
        var awName = awRelay ? (er[idx].country||'') : (er[idx].name||'');
        var awTeam = awRelay ? (er[idx].name||'') : (er[idx].country||'');
        card.innerHTML = '<div class="medal">' + icons[i] + '</div><div class="name">' + awName + '</div><div class="team">' + awTeam + '</div><div class="time">' + (er[idx].finalTime||'') + '</div>';
        container.appendChild(card);
    }
}

function renderWelcome() {
    document.getElementById('welcomeView').classList.remove('hidden');
    document.getElementById('welcomeTitle').textContent = data.competitionName || '欢迎';
    document.getElementById('welcomeSub').textContent = '';
}

// 启动：先把已知/默认的服务器IP填入遮罩输入框，并立即触发一次连接尝试
(function bootstrap() {
    var inp = document.getElementById('connHostInput');
    if (inp) {
        inp.value = getInitialHost();
        inp.addEventListener('keydown', function(ev) { if (ev.key === 'Enter') overlayConnect(); });
    }
    showConnectOverlay('连接中… ' + getInitialHost() + ':3002', '#f59e0b');
    connect();
})();
</script>
